<style>
:root {
  --iam:    #F39C12;
  --rbac:   #818cf8;
  --auth:   #38bdf8;
  --warn:   #E74C3C;
  --irsa:   #27AE60;
  --bg:     #06080d;
  --panel:  #11151c;
  --panel-light: #1f2738;
  --text:   #f1f5f9;
  --muted:  #94a3b8;
  --accent: #38bdf8;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background:
    radial-gradient(ellipse at top, rgba(243,156,18,0.06), transparent 60%),
    radial-gradient(ellipse at bottom right, rgba(129,140,248,0.05), transparent 60%),
    var(--bg);
  color: var(--text);
  font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh;
}
header {
  padding: 16px 28px;
  background: linear-gradient(135deg, rgba(243,156,18,0.85), rgba(129,140,248,0.85)), var(--bg);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  display: flex; align-items: center; gap: 16px;
}
header .badge { background: rgba(255,255,255,0.15); border-radius: 6px; padding: 2px 10px; font-size: 0.75em; font-weight: 700; letter-spacing: .06em; }
header h1 { margin: 0; font-size: 1.3em; }
header p { margin: 3px 0 0; opacity: 0.85; font-size: 0.88em; }

.layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 12px;
  padding: 12px;
  max-width: 1600px;
  margin: 0 auto;
}
.navbar {
  grid-column: 1 / -1;
  background: var(--panel);
  border: 1px solid var(--panel-light);
  border-radius: 12px;
  padding: 12px 18px;
  display: flex; gap: 16px; align-items: center;
  flex-wrap: wrap;
}
.nav-btns { display: flex; gap: 8px; }
button {
  background: var(--panel-light); color: var(--text);
  border: 1px solid #475569; border-radius: 6px;
  padding: 8px 14px; font-size: 0.9em; cursor: pointer;
  transition: background 0.15s;
}
button:hover { background: #2d3748; }
button:disabled { opacity: 0.35; cursor: not-allowed; }
button.primary { background: rgba(56,189,248,0.2); border-color: var(--accent); color: var(--accent); }
.step-info { flex: 1; }
.step-title { font-weight: 700; color: var(--accent); font-size: 1em; }
.step-narration { color: var(--muted); font-size: 0.87em; margin-top: 4px; line-height: 1.5; }
.progress-bar { width: 100%; height: 5px; background: #1e293b; border-radius: 3px; margin-top: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--iam), var(--rbac)); border-radius: 3px; transition: width 0.3s; }
.counter { font-size: 0.78em; color: var(--muted); white-space: nowrap; font-family: ui-monospace, monospace; }

/* Left panel — step list */
.steps-panel {
  background: var(--panel);
  border: 1px solid var(--panel-light);
  border-radius: 12px;
  overflow-y: auto;
  max-height: 680px;
  padding: 12px;
}
.steps-panel h2 {
  font-size: 0.72em; color: var(--muted); text-transform: uppercase;
  letter-spacing: .08em; margin: 0 0 10px; padding: 0 4px;
}
.step-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 10px; border-radius: 8px; margin-bottom: 4px;
  cursor: pointer; border: 1px solid transparent;
  transition: background 0.12s, border-color 0.12s;
  font-size: 0.85em;
}
.step-item:hover { background: rgba(255,255,255,0.04); }
.step-item.active { background: rgba(56,189,248,0.08); border-color: rgba(56,189,248,0.25); }
.step-num {
  min-width: 22px; height: 22px; border-radius: 50%;
  background: var(--panel-light); border: 1px solid #475569;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75em; font-weight: 700; flex-shrink: 0; margin-top: 1px;
}
.step-item.done .step-num { background: rgba(39,174,96,0.2); border-color: #27AE60; color: #27AE60; }
.step-item.active .step-num { background: rgba(56,189,248,0.2); border-color: var(--accent); color: var(--accent); }
.step-label { line-height: 1.4; }
.step-section { font-size: 0.68em; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; margin-top: 2px; }

/* Right panel — SVG diagram */
.diagram-panel {
  background: var(--panel);
  border: 1px solid var(--panel-light);
  border-radius: 12px;
  padding: 16px;
  display: flex; align-items: center; justify-content: center;
  min-height: 680px;
}
#main-svg {
  width: 100%; height: 100%;
  max-height: 660px;
}

/* bottom rail */
.bottom-rail {
  grid-column: 1 / -1;
  background: var(--panel);
  border: 1px solid var(--panel-light);
  border-radius: 12px;
  padding: 10px 18px;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.link-btn {
  background: var(--panel-light); color: var(--text);
  border: 1px solid #475569; border-radius: 6px;
  padding: 6px 14px; font-size: 0.82em; text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
  transition: background 0.12s;
}
.link-btn:hover { background: #2d3748; color: var(--accent); }
.link-btn.active { background: rgba(243,156,18,0.15); border-color: var(--iam); color: var(--iam); }
.kbd { background: #334155; border: 1px solid #475569; border-bottom-width: 2px; border-radius: 4px; padding: 1px 7px; font-family: ui-monospace; font-size: 0.78em; margin: 0 2px; color: var(--text); }
.hint { font-size: 0.78em; color: var(--muted); margin-left: auto; }

@media (max-width: 860px) {
  .layout { grid-template-columns: 1fr; }
  .steps-panel { max-height: 220px; }
}

<script>
// ============================================================
// STEPS DATA
// ============================================================
const STEPS = [
  // ── SECTION: Cloud-Native Security ──────────────────────────
  {
    title: 'The 4Cs of cloud-native security',
    section: 'Cloud-Native Security',
    narration: 'Cloud-native security is layered: Cloud (AWS infra), Cluster (K8s control), Container (image security), Code (app security). Each C protects the next — defense in depth.',
    render(svg) {
      clear(svg);
      svgText(svg,410,28,'The 4Cs of Cloud-Native Security — Defense in Depth',12,700,'#38bdf8');
      // 4 concentric rings (drawn outside-in)
      const rings = [
        {r:270, label:'Cloud', detail:'VPC · IAM · Security Groups · AWS infrastructure', c:'#38bdf8', fill:'#0c2a3a'},
        {r:200, label:'Cluster', detail:'RBAC · Admission controllers · Secrets', c:'#818cf8', fill:'#1a0a2a'},
        {r:130, label:'Container', detail:'Image scanning · least privilege · no root', c:'#F39C12', fill:'#2a1a0a'},
        {r: 65, label:'Code', detail:'SAST · input validation · dependencies', c:'#27AE60', fill:'#0a1a0a'},
      ];
      rings.forEach(({r,label,detail,c,fill})=>{
        svg.appendChild(el('circle',{cx:410,cy:330,r,fill,stroke:c,'stroke-width':2,'stroke-dasharray': r>100?'none':'none'}));
      });
      // Labels pointing out from center
      rings.forEach(({r,label,detail,c},i)=>{
        const midR = r - 35;
        svgText(svg,410,330-midR,label,i===0?11:10,700,c);
        if(i===0) svgText(svg,410,330-midR+15,detail,8.5,400,'#94a3b8');
      });
      // outer annotation
      svgText(svg,410,595,'Each layer protects the one inside it. A breach at Cloud affects all inner layers.',9.5,400,'#64748b');
    }
  },
  {
    title: 'Shared responsibility — default EKS',
    section: 'Cloud-Native Security',
    narration: 'In default EKS: AWS manages the control plane and underlying infrastructure. You manage worker nodes, network config, IAM, applications, add-ons, and OS patching.',
    render(svg) {
      clear(svg);
      svgText(svg,410,28,'Shared Responsibility — Default EKS',12,700,'#94a3b8');
      // Two columns
      roundRect(svg,30,55,370,480,'#0c2a3a','#38bdf8',10,1.5);
      svgText(svg,215,80,'AWS manages',13,700,'#38bdf8');
      const aws = ['Control plane','kube-apiserver (HA)','etcd (multi-AZ)','kube-scheduler','controller-manager','Underlying EC2 hardware'];
      aws.forEach((t,i)=>{
        roundRect(svg,50,100+i*64,330,50,'#0a2030','#38bdf8',6,1);
        svgText(svg,70,121+i*64,'✓',12,700,'#27AE60',{anchor:'start'});
        svgText(svg,90,121+i*64,t,11,700,'#f1f5f9',{anchor:'start'});
      });
      roundRect(svg,420,55,370,480,'#1a0a2a','#818cf8',10,1.5);
      svgText(svg,605,80,'You manage',13,700,'#818cf8');
      const you = ['Worker nodes (EC2)','Network config (VPC)','IAM roles & policies','Applications & containers','Add-ons & plugins','OS patching on nodes'];
      you.forEach((t,i)=>{
        roundRect(svg,440,100+i*64,330,50,'#130a20','#818cf8',6,1);
        svgText(svg,460,121+i*64,'◆',12,700,'#F39C12',{anchor:'start'});
        svgText(svg,480,121+i*64,t,11,700,'#f1f5f9',{anchor:'start'});
      });
    }
  },
  {
    title: 'Shared responsibility — managed node groups',
    section: 'Cloud-Native Security',
    narration: 'With managed node groups, AWS additionally handles node OS patching and node replacement on failure. You still own applications, K8s RBAC, and network policies.',
    render(svg) {
      clear(svg);
      svgText(svg,410,28,'Shared Responsibility — Managed Node Groups',12,700,'#94a3b8');
      // Header comparison
      const cols = [{x:30,label:'Default EKS',c:'#475569',fill:'#0a1020'},{x:280,label:'Managed Node Groups',c:'#38bdf8',fill:'#0c2a3a'},{x:530,label:'You always own',c:'#818cf8',fill:'#1a0a2a'}];
      cols.forEach(({x,label,c,fill})=>{
        roundRect(svg,x,55,230,55,fill,c,8,1.5);
        svgText(svg,x+115,88,label,11,700,c);
      });
      // AWS row
      svgText(svg,30,152,'AWS manages:',10,700,'#38bdf8',{anchor:'start'});
      const awsDef = ['Control plane only'];
      const awsMng = ['Control plane','Node OS patching','Node replacement on failure','AMI version management'];
      awsDef.forEach((t,i)=>{roundRect(svg,30,162+i*40,230,32,'#0a2030','#475569',4,1); svgText(svg,145,180+i*40,t,9.5,400,'#94a3b8');});
      awsMng.forEach((t,i)=>{roundRect(svg,280,162+i*40,230,32,'#0c2a3a','#38bdf8',4,1); svgText(svg,395,180+i*40,t,9.5,700,'#38bdf8');});
      // You row
      svgText(svg,30,340,'You still manage:',10,700,'#818cf8',{anchor:'start'});
      const you = ['Applications','K8s RBAC','Network policies','Pod security contexts'];
      you.forEach((t,i)=>{
        roundRect(svg,530,162+i*40,230,32,'#130a20','#818cf8',4,1);
        svgText(svg,645,180+i*40,t,9.5,700,'#818cf8');
        roundRect(svg,30,352+i*40,230,32,'#0a1020','#1f2738',4,1);
        svgText(svg,145,370+i*40,t,9.5,400,'#94a3b8');
        roundRect(svg,280,352+i*40,230,32,'#0a1020','#1f2738',4,1);
        svgText(svg,395,370+i*40,t,9.5,400,'#94a3b8');
      });
    }
  },
  {
    title: 'Shared responsibility — Fargate',
    section: 'Cloud-Native Security',
    narration: 'With Fargate, AWS manages the entire node layer — micro-VM isolation, OS, runtime. You own pod security context, application code, and K8s RBAC. Maximum AWS responsibility.',
    render(svg) {
      clear(svg);
      svgText(svg,410,28,'Shared Responsibility — Three-Column Comparison',12,700,'#94a3b8');
      const cols = [
        {x:20,  label:'Self-managed EC2', c:'#E74C3C', fill:'#1a0505'},
        {x:290, label:'Managed Node Groups', c:'#38bdf8', fill:'#0c2a3a'},
        {x:560, label:'AWS Fargate', c:'#F39C12', fill:'#2a1a0a'},
      ];
      cols.forEach(({x,label,c,fill})=>{
        roundRect(svg,x,50,250,55,fill,c,8,1.5);
        svgText(svg,x+125,83,label,11,700,c);
      });
      const rows = [
        {label:'Control plane',    ec2:true,  mng:true,  far:true},
        {label:'Node OS patching', ec2:false, mng:true,  far:true},
        {label:'Node provisioning',ec2:false, mng:true,  far:true},
        {label:'Micro-VM isolation',ec2:false,mng:false, far:true},
        {label:'Runtime OS',       ec2:false, mng:false, far:true},
        {label:'K8s RBAC',         ec2:false, mng:false, far:false},
        {label:'Pod sec context',  ec2:false, mng:false, far:false},
        {label:'Application code', ec2:false, mng:false, far:false},
      ];
      rows.forEach(({label,ec2,mng,far},i)=>{
        const y = 125+i*54;
        svgText(svg,410,y+18,label,10,700,'#94a3b8');
        [[20,'#E74C3C',ec2],[290,'#38bdf8',mng],[560,'#F39C12',far]].forEach(([x,c,managed])=>{
          roundRect(svg,x,y,250,42,managed?c.replace('#','#0a')+'18':'#0a1020',managed?c:'#1f2738',4,1);
          svgText(svg,x+125,y+25,managed?'✓ AWS':'◆ You',10,700,managed?c:'#818cf8');
        });
      });
    }
  },

  // ── SECTION: Authentication & Authorization ──────────────────
  {
    title: 'Two permission systems — IAM and RBAC',
    section: 'Authentication & Authorization',
    narration: 'IAM controls AWS API calls (create cluster, manage ECR). K8s RBAC controls K8s API calls (create pods, list secrets). They are separate but connected via the aws-auth ConfigMap.',
    render(svg) {
      clear(svg);
      svgText(svg,410,28,'Two Permission Systems — Separate but Connected',12,700,'#94a3b8');
      // Left circle: IAM
      svg.appendChild(el('circle',{cx:290,cy:280,r:160,fill:'#1a0d00',stroke:'#F39C12','stroke-width':2.5,'fill-opacity':'0.7'}));
      svgText(svg,230,210,'IAM',16,700,'#F39C12');
      svgText(svg,235,234,'Controls AWS API',10,400,'#94a3b8');
      svgText(svg,235,252,'Create cluster',9.5,400,'#f1f5f9');
      svgText(svg,235,268,'Manage node groups',9.5,400,'#f1f5f9');
      svgText(svg,235,284,'ECR access',9.5,400,'#f1f5f9');
      svgText(svg,235,300,'S3, DynamoDB, etc.',9.5,400,'#f1f5f9');
      // Right circle: RBAC
      svg.appendChild(el('circle',{cx:530,cy:280,r:160,fill:'#0d0d1a',stroke:'#818cf8','stroke-width':2.5,'fill-opacity':'0.7'}));
      svgText(svg,575,210,'K8s RBAC',16,700,'#818cf8');
      svgText(svg,575,234,'Controls K8s API',10,400,'#94a3b8');
      svgText(svg,575,252,'Create pods',9.5,400,'#f1f5f9');
      svgText(svg,575,268,'List services',9.5,400,'#f1f5f9');
      svgText(svg,575,284,'Get secrets',9.5,400,'#f1f5f9');
      svgText(svg,575,300,'Manage namespaces',9.5,400,'#f1f5f9');
      // Overlap label
      svgText(svg,410,272,'aws-auth',10,700,'#27AE60');
      svgText(svg,410,290,'ConfigMap',10,700,'#27AE60');
      svgText(svg,410,310,'bridges them',8.5,400,'#64748b');
      // Bottom note
      roundRect(svg,80,475,660,55,'#0a1020','#27AE60',8,1);
      svgText(svg,410,497,'IAM → who can call AWS APIs',10,700,'#F39C12');
      svgText(svg,410,515,'RBAC → who can call K8s APIs',10,700,'#818cf8');
    }
  },
  {
    title: 'EKS authentication flow',
    section: 'Authentication & Authorization',
    narration: 'Six steps: User has IAM credentials → aws eks get-token generates bearer token → kubectl sends token → K8s API calls AWS IAM authenticator → IAM identity confirmed → RBAC decides what you can do.',
    render(svg) {
      clear(svg);
      svgText(svg,410,25,'EKS Authentication Flow — 6 Steps',12,700,'#38bdf8');
      const steps = [
        {x:30,  y:70,  label:'1. IAM Creds', detail:'AWS_ACCESS_KEY_ID\nAWS_SECRET_ACCESS_KEY', c:'#F39C12'},
        {x:30,  y:220, label:'2. Get Token', detail:'aws eks get-token\n--cluster-name prod', c:'#38bdf8'},
        {x:30,  y:370, label:'3. kubectl send', detail:'Bearer token in\nHTTP Authorization header', c:'#818cf8'},
        {x:450, y:370, label:'4. API calls IAM', detail:'K8s API server → AWS\nIAM Authenticator webhook', c:'#F39C12'},
        {x:450, y:220, label:'5. IAM confirmed', detail:'AWS confirms IAM\nidentity is valid', c:'#27AE60'},
        {x:450, y:70,  label:'6. RBAC check', detail:'K8s RBAC decides\nwhat you can do', c:'#818cf8'},
      ];
      steps.forEach(({x,y,label,detail,c})=>{
        roundRect(svg,x,y,310,110,c.replace('#','#0c')+'18',c,8,1.5);
        svgText(svg,x+155,y+36,label,12,700,c);
        detail.split('\n').forEach((l,i)=>svgText(svg,x+155,y+58+i*18,l,9.5,400,'#94a3b8'));
      });
      // Arrows connecting steps
      arrowV(svg,185,182,185,218,'#38bdf8');
      arrowV(svg,185,332,185,368,'#818cf8');
      arrowH(svg,342,425,448,425,'#F39C12');
      arrowV(svg,605,368,605,332,'#27AE60');
      arrowV(svg,605,218,605,182,'#818cf8');
      arrowH(svg,448,125,342,125,'#27AE60');
    }
  },
  {
    title: 'OIDC — the trust bridge',
    section: 'Authentication & Authorization',
    narration: 'EKS cluster has an OIDC issuer URL. IAM trusts this OIDC provider. This enables workload identity (IRSA), external identity provider login, and federated auth. Enable via eksctl.',
    render(svg) {
      clear(svg);
      svgText(svg,410,28,'OIDC — The Trust Bridge',12,700,'#38bdf8');
      // EKS cluster
      roundRect(svg,30,70,230,120,'#0c2a3a','#38bdf8',8,1.5);
      svgText(svg,145,100,'EKS Cluster',12,700,'#38bdf8');
      svgText(svg,145,118,'has OIDC issuer URL:',9,400,'#94a3b8');
      svgText(svg,145,134,'oidc.eks.us-east-1.',8.5,400,'#c5e478');
      svgText(svg,145,148,'amazonaws.com/id/XYZ',8.5,400,'#c5e478');
      // IAM Trust
      roundRect(svg,310,70,230,120,'#2a1a0a','#F39C12',8,1.5);
      svgText(svg,425,100,'AWS IAM',12,700,'#F39C12');
      svgText(svg,425,118,'trusts this OIDC provider',9,400,'#94a3b8');
      svgText(svg,425,136,'eksctl utils associate-',8.5,400,'#c5e478');
      svgText(svg,425,150,'iam-oidc-provider',8.5,400,'#c5e478');
      // Three outcomes
      roundRect(svg,590,50,210,55,'#0a1a0a','#27AE60',8,1.5);
      svgText(svg,695,72,'Workload Identity',10,700,'#27AE60');
      svgText(svg,695,88,'(IRSA)',9.5,400,'#94a3b8');
      roundRect(svg,590,125,210,55,'#1a0a2a','#818cf8',8,1.5);
      svgText(svg,695,147,'External IdP Login',10,700,'#818cf8');
      svgText(svg,695,163,'(Okta, Azure AD)',9.5,400,'#94a3b8');

        {c:'#818cf8', title:'aws-auth: 2-step grant', detail:'Step 1: add IAM role to aws-auth (auth). Step 2: create ClusterRoleBinding (authz). Miss either = broken.'},
        {c:'#E74C3C', title:'Never delete aws-auth', detail:'Deletes locks everyone out. Only cluster creator + AWS Console for recovery. Always edit, never delete.'},
        {c:'#27AE60', title:'IRSA = pod-level IAM role (preferred)', detail:'OIDC trust + SA annotation + projected token. Per-pod, per-namespace IAM scope. Beats node role sharing.'},
        {c:'#F39C12', title:'ClusterRole + RoleBinding trick', detail:'ClusterRole defines rules once. Regular RoleBinding scopes it to one namespace. Reusable, DRY RBAC.'},
        {c:'#818cf8', title:'OIDC provider = IRSA prerequisite', detail:'eksctl utils associate-iam-oidc-provider. Without it, IRSA tokens cannot be validated by IAM.'},
      ];
      pts.forEach(({c,title,detail},i)=>{
        roundRect(svg,30,50+i*78,760,66,c.replace('#','#06')+'08',c,8,1.5);
        svgText(svg,55,74+i*78,title,11,700,c,{anchor:'start'});
        svgText(svg,55,92+i*78,detail,9.5,400,'#94a3b8',{anchor:'start'});
      });
    }
  },
];

// ============================================================
// SVG HELPERS
// ============================================================
const NS = 'http://www.w3.org/2000/svg';
function el(tag,attrs){
  const e = document.createElementNS(NS,tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  return e;
}
function clear(svg){ while(svg.firstChild) svg.removeChild(svg.firstChild); }
function roundRect(svg,x,y,w,h,fill,stroke,rx=8,sw=1.5){
  svg.appendChild(el('rect',{x,y,width:w,height:h,rx,fill,stroke,'stroke-width':sw}));
}
function svgText(svg,x,y,txt,size=11,weight=400,fill='#f1f5f9',opts={}){
  const t = el('text',{x,y,'font-size':size,'font-weight':weight,fill,
    'font-family':'system-ui,sans-serif','text-anchor':opts.anchor||'middle'});
  t.textContent=txt; svg.appendChild(t); return t;
}
function line(svg,x1,y1,x2,y2,stroke='#475569'){
  svg.appendChild(el('line',{x1,y1,x2,y2,stroke,'stroke-width':1.5}));
}
function arrow(svg,x1,y1,x2,y2,color='#38bdf8'){
  const id='a'+Math.random().toString(36).slice(2);
  let defs=svg.querySelector('defs');
  if(!defs){defs=el('defs');svg.insertBefore(defs,svg.firstChild);}
  const mk=el('marker',{id,markerWidth:7,markerHeight:7,refX:5,refY:3,orient:'auto'});
  const p=el('polygon',{points:'0 0,7 3,0 6',fill:color}); mk.appendChild(p); defs.appendChild(mk);
  svg.appendChild(el('line',{x1,y1,x2,y2,stroke:color,'stroke-width':2,'marker-end':`url(#${id})`}));
}
function arrowH(svg,x1,y1,x2,y2,c='#38bdf8'){ arrow(svg,x1,y1,x2-4,y2,c); }
function arrowV(svg,x1,y1,x2,y2,c='#38bdf8'){ arrow(svg,x1,y1,x2,y2-4,c); }

// ============================================================
// STATE + RENDER
// ============================================================
let current = 0;
let playing = false;
let timer = null;
const TOTAL = STEPS.length;
const svg = document.getElementById('main-svg');

function go(idx){
  current = Math.max(0, Math.min(TOTAL-1, idx));
  render();
}
function render(){
  const s = STEPS[current];
  document.getElementById('nav-title').textContent = s.title;
  document.getElementById('nav-narration').textContent = s.narration;
  document.getElementById('counter').textContent = `${current+1} / ${TOTAL}`;
  document.getElementById('progress-fill').style.width = `${((current+1)/TOTAL)*100}%`;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === TOTAL-1;
  document.querySelectorAll('.step-item').forEach((el,i)=>{
    el.classList.toggle('active', i===current);
    el.classList.toggle('done', i<current);
  });
  const activeEl = document.querySelector('.step-item.active');
  if(activeEl) activeEl.scrollIntoView({block:'nearest',behavior:'smooth'});
  s.render(svg);
}
function togglePlay(){
  playing=!playing;
  const btn=document.getElementById('btn-play');
  btn.textContent = playing ? '⏸ Pause' : '▶ Auto-play';
  if(playing) tick(); else clearTimeout(timer);
}
function tick(){
  clearTimeout(timer);
  if(!playing) return;
  if(current >= TOTAL-1){ playing=false; document.getElementById('btn-play').textContent='▶ Auto-play'; return; }
  timer = setTimeout(()=>{ go(current+1); if(playing) tick(); }, 3500);
}

// ============================================================
// STEP LIST
// ============================================================
function buildStepList(){
  const container = document.getElementById('step-list');
  let lastSection = '';
  STEPS.forEach((s,i)=>{
    if(s.section !== lastSection){
      const h = document.createElement('div');
      h.style.cssText='font-size:0.68em;color:#475569;text-transform:uppercase;letter-spacing:.08em;padding:8px 10px 2px;';
      h.textContent = s.section;
      container.appendChild(h);
      lastSection = s.section;
    }
    const item = document.createElement('div');
    item.className = 'step-item';
    item.innerHTML = `<div class="step-num">${i+1}</div><div class="step-label">${s.title}</div>`;
    item.addEventListener('click',()=>{ clearTimeout(timer); playing=false; document.getElementById('btn-play').textContent='▶ Auto-play'; go(i); });
    container.appendChild(item);
  });
}

// ============================================================
// EVENT LISTENERS
// ============================================================
document.getElementById('btn-prev').addEventListener('click',()=>{ clearTimeout(timer); playing=false; document.getElementById('btn-play').textContent='▶ Auto-play'; go(current-1); });
document.getElementById('btn-next').addEventListener('click',()=>{ clearTimeout(timer); playing=false; document.getElementById('btn-play').textContent='▶ Auto-play'; go(current+1); });
document.getElementById('btn-play').addEventListener('click',togglePlay);

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='l'){ clearTimeout(timer); playing=false; document.getElementById('btn-play').textContent='▶ Auto-play'; go(current+1); }
  else if(e.key==='ArrowLeft'||e.key==='h'){ clearTimeout(timer); playing=false; document.getElementById('btn-play').textContent='▶ Auto-play'; go(current-1); }
  else if(e.key===' '){ e.preventDefault(); togglePlay(); }
});

// ============================================================
// INIT
// ============================================================
buildStepList();
render();
</script>
