window.LAB_STEPS=[
{section:'Cluster Creation',title:'Three ways to create an EKS cluster',narration:'AWS Console (GUI, no scripting), AWS CLI (flexible, scriptable), eksctl (powerful, single command, best for automation). Choose based on team skill and repeatability needs.',render(s){clearSVG(s);tx(s,410,25,'Three cluster creation interfaces',13,700,'#38bdf8');[[130,'AWS Console','GUI-driven\nMost actions in browser\nGreat for exploration','#818cf8'],[410,'AWS CLI','aws eks create-cluster\nGreater flexibility\nHigher complexity','#F39C12'],[680,'eksctl','eksctl create cluster\nSingle command\nBest for automation','#38bdf8']].forEach(([x,t,d,c])=>{rr(s,x-120,50,240,350,c+'08',c,10,1.5);tx(s,x,80,t,13,700,c);d.split('\n').forEach((l,i)=>tx(s,x,115+i*28,l,10,400,'#94a3b8'));});}},
{section:'Cluster Creation',title:'eksctl — powerful single command',narration:'eksctl create cluster --name prod --version 1.29 --region us-west-2 --node-type t3.medium --nodes 3 --nodes-min 1 --nodes-max 4 --managed. One command creates a fully working cluster.',render(s){clearSVG(s);rr(s,30,40,760,110,'#03050a','#27AE60',8,1.5);tx(s,50,65,'$ eksctl create cluster \\',10.5,700,'#c5e478','start');tx(s,50,85,'  --name prod  --version 1.29  --region us-west-2 \\',10,400,'#c5e478','start');tx(s,50,105,'  --node-type t3.medium  --nodes 3  --nodes-min 1  --nodes-max 4  --managed',10,400,'#c5e478','start');tx(s,50,125,'  OR:  eksctl create cluster -f cluster.yaml',10,400,'#86efac','start');tx(s,410,175,'Each flag explained:',11,700,'#94a3b8');[['--name','Cluster name visible in AWS Console'],['--version','Kubernetes version (1.27/1.28/1.29)'],['--node-type','EC2 instance type for worker nodes'],['--nodes / --nodes-min / --nodes-max','ASG desired / min / max'],['--managed','Use managed node groups (recommended)']].forEach(([f,d],i)=>{rr(s,60,200+i*56,700,44,'#0a1a2a','#38bdf8',5,1);tx(s,80,220+i*56,f,10,700,'#38bdf8','start');tx(s,280,220+i*56,d,9.5,400,'#94a3b8','start');});}},
{section:'Cluster Creation',title:'cluster.yaml — declarative cluster config',narration:'Instead of CLI flags, define everything in a YAML file checked into Git. Supports: private subnets, multiple node groups, specific AMIs, Fargate profiles, and many advanced options.',render(s){clearSVG(s);rr(s,30,30,500,440,'#03050a','#38bdf8',8,1.5);tx(s,280,55,'cluster.yaml',11,700,'#38bdf8');const lines=['apiVersion: eksctl.io/v1alpha5','kind: ClusterConfig','metadata:','  name: MyEKScluster','  region: us-east-1','vpc:','  subnets:','    private:','      us-east-1b: { id: subnet-0fdd9b15 }','      us-east-1c: { id: subnet-061bff24 }','nodeGroups:','  - name: ClusterNodes','    instanceType: m5.xlarge','    desiredCapacity: 3','    privateNetworking: true'];lines.forEach((l,i)=>tx(s,50,72+i*22,l,9,400,'#c5e478','start'));rr(s,560,30,200,100,'#0c2a3a','#38bdf8',8,1.5);tx(s,660,55,'Key benefits',10,700,'#38bdf8');['✓ Git version control','✓ Reproducible','✓ Review via PR','✓ Complex configs'].forEach((l,i)=>tx(s,660,78+i*18,l,9,400,'#86efac'));rr(s,560,150,200,100,'#2a1a0a','#F39C12',8,1.5);tx(s,660,175,'Run with:',10,700,'#F39C12');tx(s,660,195,'eksctl create',9,400,'#94a3b8');tx(s,660,213,'cluster -f',9,400,'#94a3b8');tx(s,660,231,'cluster.yaml',9,400,'#94a3b8');}},
{section:'Cluster Creation',title:'eksctl defaults — what it creates automatically',narration:'With a single eksctl create cluster command, eksctl automatically provisions 5 things so you have a working cluster from day one.',render(s){clearSVG(s);tx(s,410,25,'eksctl create cluster → 5 automatic creations',12,700,'#F39C12');[['1. IAM roles','For cluster + node group — enables AWS API calls'],['2. Dedicated VPC','CIDR 192.168.0.0/16, public+private subnets, IGW, NAT'],['3. EKS cluster','Control plane across 2+ AZs'],['4. Managed node group','ASG with 2 EC2 worker nodes (default)'],['5. kubeconfig','Written to ~/.kube/config for immediate kubectl access']].forEach(([t,d],i)=>{rr(s,60,55+i*90,700,72,'#0a1a0a','#F39C12',8,1.5);tx(s,80,82+i*90,t,12,700,'#F39C12','start');tx(s,80,100+i*90,d,10,400,'#94a3b8','start');});}},
{section:'Node AMIs',title:'Four node AMI types',narration:'EKS Optimized Linux is the default turnkey choice. Bottlerocket is purpose-built for containers and open-source. Custom lets you build your own. Windows supports Windows containers.',render(s){clearSVG(s);tx(s,410,25,'Node AMI Types',13,700,'#38bdf8');[{x:110,t:'EKS Optimized Linux',d:['Default for EKS','Turnkey solution','Amazon Linux 2 / AL2023','Supported: EC2 + Fargate'],c:'#38bdf8'},{x:310,t:'Bottlerocket',d:['Open-source by AWS','Purpose-built for containers','Minimal attack surface','NOT for custom builds'],c:'#27AE60'},{x:510,t:'Custom',d:['Build your own AMI','GitHub spec available','Full control','NOT for Fargate'],c:'#F39C12'},{x:710,t:'Windows',d:['Windows containers','Server 2019 / 2022','EC2 nodes only','Special node group'],c:'#818cf8'}].forEach(({x,t,d,c})=>{rr(s,x-90,50,180,330,c+'08',c,8,1.5);tx(s,x,78,t,10.5,700,c);d.forEach((l,i)=>tx(s,x,108+i*28,l,9,400,'#94a3b8'));});}},
{section:'Node AMIs',title:'Bottlerocket — purpose-built container OS',narration:'Bottlerocket strips away everything unnecessary for running containers: no shell by default, immutable root filesystem, automatic atomic OS updates, minimal CVE surface area.',render(s){clearSVG(s);tx(s,220,25,'Amazon Linux 2',12,700,'#E74C3C');rr(s,30,45,360,380,'#1a0505','#E74C3C',10,1.5);['Full Linux userspace','Package manager (yum/apt)','Mutable filesystem','Shell (bash/sh)','~500MB base image','General purpose OS','Larger attack surface'].forEach((l,i)=>{rr(s,50,68+i*44,320,36,'#2a0808','#E74C3C',5,1);tx(s,210,89+i*44,l,9.5,400,'#f1f5f9');});tx(s,600,25,'Bottlerocket',12,700,'#27AE60');rr(s,440,45,340,380,'#0a1a0a','#27AE60',10,1.5);['Container-focused only','No package manager','Immutable root filesystem','No shell (by default)','~200MB base image','Purpose-built for containers','Minimal attack surface ✓'].forEach((l,i)=>{rr(s,460,68+i*44,300,36,'#0a2a0a','#27AE60',5,1);tx(s,610,89+i*44,l,9.5,400,'#f1f5f9');});}},
{section:'Upgrades',title:'Kubernetes version upgrade — why it matters',narration:'Patch versions (1.29.1 → 1.29.2) are auto-applied to the control plane. Minor versions (1.28 → 1.29) YOU control. Only minor upgrades can remove APIs — this is the exam key point.',render(s){clearSVG(s);tx(s,410,25,'K8s version: MAJOR.MINOR.PATCH',13,700,'#F39C12');rr(s,100,60,620,100,'#0a1020','#38bdf8',8,1.5);tx(s,410,103,'1   .   29   .   5',20,700,'#38bdf8');[['MAJOR','1','Theoretical — never used','#94a3b8',145],[' MINOR','29','YOU control upgrades here','#F39C12',345],['PATCH','5','AWS auto-applies to control plane','#27AE60',560]].forEach(([l,_,d,c,x])=>{tx(s,x,190,l,10,700,c);tx(s,x,210,d,8.5,400,'#94a3b8');});rr(s,60,250,700,80,'#1a0a00','#F39C12',8,2);tx(s,410,278,'⚠ Only MINOR version upgrades can REMOVE APIs',12,700,'#F39C12');tx(s,410,298,'Always check release notes for deprecated API removals before upgrading',10,400,'#94a3b8');rr(s,60,350,700,60,'#0a1a0a','#27AE60',8,1.5);tx(s,410,376,'Patch upgrades: applied automatically to control plane — no action required',10,400,'#86efac');tx(s,410,394,'Data plane (nodes) always upgraded manually regardless of patch/minor',10,400,'#94a3b8');}},
{section:'Upgrades',title:'The 8-step upgrade sequence',narration:'Never skip steps. The sequence ensures you catch API removals, backup state, and upgrade components in the right order: control plane first, then add-ons, then data plane last.',render(s){clearSVG(s);tx(s,410,20,'8-Step Kubernetes Upgrade Sequence',13,700,'#38bdf8');const steps=[['Review release notes','Find breaking changes, removed APIs, new features','#38bdf8'],['Backup cluster (optional)','Velero or etcd snapshot for safety','#818cf8'],['Identify API changes','Run kubectl convert or Pluto to find deprecated APIs','#F39C12'],['Check node group versioning','Nodes must be ≤1 minor version behind control plane','#27AE60'],['Upgrade control plane','eksctl upgrade cluster --name prod --version 1.29','#38bdf8'],['Review + upgrade add-ons','CoreDNS, VPC CNI, kube-proxy versions per compatibility matrix','#818cf8'],['Upgrade kubectl','Match kubectl version to new cluster version','#F39C12'],['Upgrade data plane','eksctl upgrade nodegroup OR managed node group rolling update','#27AE60']];steps.forEach(([t,d,c],i)=>{rr(s,40,38+i*60,740,48,c+'08',c,6,1.5);tx(s,70,60+i*60,`${i+1}. ${t}`,10.5,700,c,'start');tx(s,70,76+i*60,d,9,400,'#94a3b8','start');});}},
{section:'Upgrades',title:'What happens during control plane upgrade',narration:'EKS deploys new API server nodes alongside existing ones. If anything goes wrong, it automatically rolls back. Nodes and add-ons are NOT touched — you upgrade those separately after.',render(s){clearSVG(s);tx(s,410,25,'Control plane upgrade — what EKS does',12,700,'#38bdf8');[['New API server nodes deployed','alongside existing ones (zero downtime goal)','#38bdf8'],['Automatic rollback','if health checks fail during upgrade','#27AE60'],['Possible minor service interruptions','brief API unavailability during switchover','#F39C12'],['Nodes remain unchanged','still on old K8s version — your job to upgrade','#94a3b8'],['Add-ons remain unchanged','CoreDNS, VPC CNI still on old version — upgrade separately','#94a3b8']].forEach(([t,d,c],i)=>{rr(s,40,55+i*88,740,72,c+'08',c,8,1.5);tx(s,60,82+i*88,t,11,700,c,'start');tx(s,60,100+i*88,d,9.5,400,'#94a3b8','start');});}},
{section:'Upgrades',title:'Node upgrade paths by type',narration:'Self-managed nodes require manual tooling. Managed node groups handle the rolling cordon/drain/terminate automatically via Console or eksctl. Fargate needs zero action — AWS upgrades the micro-VMs.',render(s){clearSVG(s);tx(s,410,25,'How to upgrade nodes — 3 paths',13,700,'#38bdf8');[[130,'Self-managed\nnodes','Use AWS tools or\nthird-party tooling\n(e.g., kops, Ansible)\nYou handle cordon+drain','#E74C3C','HIGH effort'],[410,'Managed\nnode groups','Console or eksctl:\neksctl upgrade nodegroup\nAutomatic rolling update\nCordon+drain+terminate','#38bdf8','MEDIUM effort'],[680,'AWS\nFargate','Nothing required\nAWS upgrades micro-VMs\nalong with K8s version\nfully automated','#27AE60','ZERO effort']].forEach(([x,t,d,c,e])=>{rr(s,x-120,50,240,380,c+'08',c,10,1.5);t.split('\n').forEach((l,i)=>tx(s,x,78+i*18,l,12,700,c));d.split('\n').forEach((l,i)=>tx(s,x,136+i*26,l,9.5,400,'#94a3b8'));rr(s,x-100,390,200,30,c+'08',c,6,1);tx(s,x,410,e,10,700,c);});}},
{section:'Add-ons',title:'EKS managed add-ons',narration:'EKS manages four core add-ons: CoreDNS for cluster DNS, kube-proxy for Service routing, Amazon VPC CNI for pod networking, and EBS CSI driver for persistent volumes.',render(s){clearSVG(s);tx(s,410,25,'EKS Managed Add-ons — installed via EKS API',12,700,'#27AE60');[['CoreDNS','Resolves svc.cluster.local DNS names\nInstalled as Deployment in kube-system\nexctl/Console manages version','#38bdf8',130,100],['kube-proxy','Sets iptables rules for Service routing\nDaemonSet on every node\nMust match K8s minor version','#818cf8',570,100],['Amazon VPC CNI','Assigns VPC IPs to pods\naws-node DaemonSet\nControls ENI + IP allocation','#F39C12',130,300],['EBS CSI Driver','Provisions EBS volumes for PVCs\nebs.csi.aws.com provisioner\nRequired for PersistentVolumes','#27AE60',570,300]].forEach(([t,d,c,x,y])=>{rr(s,x-140,y-30,280,150,c+'08',c,8,1.5);tx(s,x,y-4,t,12,700,c);d.split('\n').forEach((l,i)=>tx(s,x,y+18+i*18,l,9,400,'#94a3b8'));});}},
{section:'Knowledge Checks',title:'Knowledge checks — official answers',narration:'KC1: Which node type is purpose-built for containers and open-source? Answer B: Bottlerocket. KC2: How to specify region in eksctl? Answer B (--region flag) and C (cluster.yaml). KC3: Minimum upgrade that removes APIs? Answer B: Minor version.',render(s){clearSVG(s);[[30,50,'KC1: Purpose-built container OS → B: Bottlerocket ✓','#27AE60'],[30,170,'KC2: Specify region with eksctl → B: --region flag  AND  C: cluster.yaml ✓','#38bdf8'],[30,290,'KC3: Minimum version that removes APIs → B: Minor version upgrade ✓','#F39C12']].forEach(([x,y,q,c])=>{rr(s,x,y,760,100,c+'08',c,8,1.5);tx(s,410,y+36,q,11,700,c);tx(s,x+20,y+64,'(A) Edit post-creation  ✗   (D) Tag the Region  ✗   (E) kubectl label  ✗   — only B and C are correct',9,400,'#94a3b8','start');});rr(s,60,400,700,80,'#0a1020','#27AE60',8,1.5);tx(s,410,428,'Also: kubelet + application pods USE node IAM role (B+D)',11,700,'#27AE60');tx(s,410,446,'API server and kubectl do NOT use node IAM role',9,400,'#94a3b8');}},
{section:'Summary',title:'Module 03 — key takeaways',narration:'Choose your interface: eksctl for automation, Console for exploration. Cluster.yaml enables GitOps. Upgrade sequence: 8 steps, control plane first. Managed node groups and Fargate simplify the data plane upgrade.',render(s){clearSVG(s);tx(s,410,25,'Module 03 Summary',13,700,'#f1f5f9');[['🔧 eksctl','Single command or cluster.yaml. Creates VPC + cluster + node group + kubeconfig automatically.','#38bdf8'],['📋 cluster.yaml','Declarative config in Git. Enables reproducible, reviewable cluster definitions.','#27AE60'],['🖥️ AMI types','EKS Linux (default), Bottlerocket (purpose-built, open-source), Custom, Windows.','#F39C12'],['📈 Upgrade sequence','8 steps. Control plane first. Patch auto-applied. Only minor removes APIs.','#818cf8'],['📦 Add-ons','CoreDNS, VPC CNI, kube-proxy, EBS CSI — managed lifecycle via EKS API.','#ED7100'],['🚀 Data plane','Self-managed=hard, Managed node groups=medium, Fargate=zero effort.','#94a3b8']].forEach(([icon,desc,c],i)=>{rr(s,40,50+i*72,740,58,c+'08',c,6,1.5);tx(s,60,76+i*72,icon,11,700,c,'start');tx(s,240,76+i*72,desc,10,400,'#94a3b8','start');});}},
