window.LAB_STEPS=[
{section:'Storage Patterns',title:'Stateless vs stateful apps',narration:'Stateless apps: all replicas are identical and data is transient — ephemeral storage is fine. Stateful apps: each instance has unique identity and data must persist — need persistent storage.',render(s){clearSVG(s);rr(s,30,40,340,440,'#0c2a3a','#38bdf8',10,1.5);tx(s,200,65,'Stateless',12,700,'#38bdf8');['Replicas interchangeable','Data transient (OK to lose)','Any pod can replace any','Fast horizontal scaling','Examples: web frontend,','microservice APIs, workers'].forEach((l,i)=>tx(s,200,98+i*44,l,10,400,'#94a3b8'));rr(s,60,320,260,60,'#0a2a0a','#27AE60',6,1.5);tx(s,190,346,'emptyDir volume',10,700,'#27AE60');tx(s,190,362,'ephemeral — fine here',8.5,400,'#86efac');rr(s,440,40,340,440,'#0c1a0a','#F39C12',10,1.5);tx(s,610,65,'Stateful',12,700,'#F39C12');['Unique pod identity','Data must persist','Ordered startup/shutdown','Stable network hostname','Examples: MySQL, Kafka,','Redis, Elasticsearch'].forEach((l,i)=>tx(s,610,98+i*44,l,10,400,'#94a3b8'));rr(s,470,320,260,60,'#1a1a00','#F39C12',6,1.5);tx(s,600,346,'PersistentVolume required',10,700,'#F39C12');tx(s,600,362,'EBS or EFS',8.5,400,'#94a3b8');}},
{section:'Storage Patterns',title:'StatefulSets — ordered pods with stable identity',narration:'StatefulSets give each pod a persistent name: mysql-0, mysql-1, mysql-2. They start in order (0 first) and stop in reverse. Each gets its own PVC that survives pod restarts.',render(s){clearSVG(s);tx(s,410,20,'StatefulSet vs Deployment',12,700,'#818cf8');rr(s,30,45,340,440,'#0a0a1a','#475569',8,1.5);tx(s,200,68,'Deployment',11,700,'#475569');tx(s,200,86,'Pods are interchangeable',9,400,'#64748b');['pod-7f9d2-abc','pod-7f9d2-xyz','pod-7f9d2-mno'].forEach((n,i)=>{rr(s,60,105+i*110,280,90,'#0a1020','#475569',5,1);tx(s,200,133+i*110,n,9.5,700,'#475569');tx(s,200,149+i*110,'random name',8,400,'#64748b');tx(s,200,165+i*110,'shared PVC or none',8,400,'#64748b');});rr(s,440,45,330,440,'#0a0a1a','#818cf8',8,1.5);tx(s,605,68,'StatefulSet',11,700,'#818cf8');tx(s,605,86,'Pods have stable identity',9,400,'#94a3b8');['mysql-0','mysql-1','mysql-2'].forEach((n,i)=>{rr(s,460,105+i*110,270,90,'#0a0a1a','#818cf8',5,1);tx(s,595,133+i*110,n,9.5,700,'#818cf8');tx(s,595,149+i*110,'stable hostname via DNS',8,400,'#94a3b8');tx(s,595,165+i*110,`OWN PVC: data-${n}`,8,700,'#F39C12');});}},
{section:'K8s Storage Objects',title:'Ephemeral volume (emptyDir)',narration:'emptyDir creates a temporary directory that exists only for the pod lifetime. Multiple containers in the same pod can share it. Use for: scratch space, caching, inter-container communication.',render(s){clearSVG(s);tx(s,410,20,'emptyDir — ephemeral storage',12,700,'#38bdf8');rr(s,30,45,500,180,'#03050a','#38bdf8',8,1.5);['apiVersion: v1','kind: Pod','spec:','  containers:','  - name: app','    volumeMounts:','    - name: cache','      mountPath: /cache','  volumes:','  - name: cache','    emptyDir: {}'].forEach((l,i)=>tx(s,50,68+i*15,l,9,400,'#c5e478','start'));rr(s,560,45,220,80,'#0a2a3a','#38bdf8',8,1.5);tx(s,670,74,'Created when pod starts',9,400,'#94a3b8');tx(s,670,90,'Deleted when pod stops',9,400,'#94a3b8');rr(s,560,145,220,80,'#1a0505','#E74C3C',8,1.5);tx(s,670,174,'⚠ Data lost on pod death',10,700,'#E74C3C');tx(s,670,192,'Not for persistent data',9,400,'#94a3b8');rr(s,60,260,700,80,'#0a1020','#27AE60',8,1.5);tx(s,410,285,'Use cases: temp files, shared scratch, inter-container file passing',10,700,'#27AE60');tx(s,410,303,'Scenario: stateless multi-replica app → emptyDir ✓',9,400,'#94a3b8');}},
{section:'K8s Storage Objects',title:'PV → PVC → Pod: the binding lifecycle',narration:'Admin creates PersistentVolume (or StorageClass auto-creates it). User creates PersistentVolumeClaim requesting storage. K8s binds matching PVC to PV. Pod mounts PVC.',render(s){clearSVG(s);tx(s,410,20,'PV → PVC → Pod binding',12,700,'#F39C12');rr(s,30,45,220,120,'#0a1020','#818cf8',8,1.5);tx(s,140,68,'PersistentVolume',10,700,'#818cf8');tx(s,140,86,'5Gi, RWO',8.5,400,'#94a3b8');tx(s,140,102,'ebs-vol-xyz',8.5,400,'#64748b');tx(s,140,118,'Available',8.5,700,'#27AE60');arrH(s,252,105,290,'#F39C12');rr(s,292,45,220,120,'#1a0a00','#F39C12',8,1.5);tx(s,402,68,'PersistentVolumeClaim',10,700,'#F39C12');tx(s,402,86,'requests: 5Gi',8.5,400,'#94a3b8');tx(s,402,102,'access: RWO',8.5,400,'#64748b');tx(s,402,118,'Bound → PV ✓',8.5,700,'#27AE60');arrH(s,514,105,550,'#F39C12');rr(s,552,45,220,120,'#0a1a0a','#27AE60',8,1.5);tx(s,662,68,'Pod',10,700,'#27AE60');tx(s,662,86,'volumes:',8.5,400,'#94a3b8');tx(s,662,102,'persistentVolumeClaim:',8.5,400,'#64748b');tx(s,662,118,'claimName: my-pvc',8.5,400,'#86efac');['Provisioned → Available → Bound → Released → Reclaim'].forEach((l,i)=>tx(s,410,200+i*24,l,9,700,'#F39C12'));rr(s,60,240,700,80,'#0a1020','#27AE60',6,1.5);tx(s,410,265,'Reclaim policies: Delete (PV deleted with PVC) · Retain (PV stays, must manually clean)','',400,'#94a3b8');tx(s,410,265,'Reclaim policies: Delete (PV removed with PVC) · Retain (PV stays for admin to reclaim)',9,400,'#94a3b8');}},
{section:'K8s Storage Objects',title:'StorageClass — dynamic provisioning',narration:'Instead of pre-creating PVs, define a StorageClass with a provisioner. When a PVC is created, K8s automatically calls the provisioner to create the PV. No manual admin work.',render(s){clearSVG(s);tx(s,410,20,'StorageClass — automatic PV provisioning',12,700,'#27AE60');rr(s,30,45,480,160,'#03050a','#27AE60',8,1.5);['apiVersion: storage.k8s.io/v1','kind: StorageClass','metadata:','  name: ebs-standard','provisioner: ebs.csi.aws.com','volumeBindingMode: WaitForFirstConsumer','allowVolumeExpansion: true','parameters:','  type: gp3','  encrypted: "true"'].forEach((l,i)=>tx(s,50,68+i*14,l,9,400,'#c5e478','start'));rr(s,540,45,230,160,'#0a2a0a','#27AE60',8,1.5);tx(s,655,70,'WaitForFirstConsumer',9,700,'#27AE60');tx(s,655,88,'Wait until pod scheduled',8.5,400,'#94a3b8');tx(s,655,104,'before creating EBS',8.5,400,'#94a3b8');tx(s,655,120,'Volume created in pod\'s AZ',8.5,700,'#27AE60');const flow=[{x:100,y:240,l:'User creates PVC',c:'#38bdf8'},{x:300,y:240,l:'K8s → StorageClass',c:'#27AE60'},{x:500,y:240,l:'Provisioner called',c:'#F39C12'},{x:680,y:240,l:'PV auto-created',c:'#818cf8'}];flow.forEach(({x,y,l,c},i)=>{rr(s,x-70,y-20,140,48,c+'08',c,5,1.5);tx(s,x,y+8,l,9,700,c);if(i<3)arrH(s,x+72,y+4,x+128,c);});}},
{section:'AWS Storage',title:'EBS vs EFS — when to use each',narration:'EBS is block storage attached to one node at a time (ReadWriteOnce). EFS is a shared file system accessible by many nodes simultaneously (ReadWriteMany). EFS supports Fargate, EBS does not.',render(s){clearSVG(s);tx(s,220,25,'Amazon EBS',12,700,'#F39C12');rr(s,30,45,360,420,'#1a0a00','#F39C12',10,1.5);[['Access mode','ReadWriteOnce (one node)'],['Protocol','Block storage'],['Fargate support','✗ NOT supported'],['Use case','Databases, StatefulSets'],['Performance','High IOPS (io2), General (gp3)'],['Resizing','Dynamic expansion ✓'],['Best for','Each replica needs OWN data']].forEach(([k,v],i)=>{const c=k==='Fargate support'?'#E74C3C':'#F39C12';rr(s,50,68+i*48,320,40,c+'06',c,4,1);tx(s,70,90+i*48,k,9.5,700,c,'start');tx(s,230,90+i*48,v,9,400,'#94a3b8','start');});tx(s,590,25,'Amazon EFS',12,700,'#27AE60');rr(s,450,45,320,420,'#0a1a00','#27AE60',10,1.5);[['Access mode','ReadWriteMany (many nodes)'],['Protocol','NFSv4 file system'],['Fargate support','✓ Supported'],['Use case','Shared data, ML datasets'],['Performance','Elastic, scales automatically'],['Resizing','Auto-elastic ✓'],['Best for','Replicas sharing same data']].forEach(([k,v],i)=>{const c=k==='Fargate support'?'#27AE60':'#27AE60';rr(s,470,68+i*48,280,40,'#0a2a0a','#27AE60',4,1);tx(s,490,90+i*48,k,9.5,700,c,'start');tx(s,620,90+i*48,v,9,400,'#94a3b8','start');});}},
{section:'AWS Storage',title:'CSI drivers — the bridge to AWS storage',narration:'Container Storage Interface is the standard API between Kubernetes and storage providers. The EBS CSI driver (ebs.csi.aws.com) and EFS CSI driver (efs.csi.aws.com) are EKS managed add-ons.',render(s){clearSVG(s);tx(s,410,20,'CSI drivers — K8s ↔ AWS storage',12,700,'#818cf8');rr(s,30,50,180,70,'#0a1a0a','#27AE60',6,1.5);tx(s,120,78,'Pod needs storage',9.5,700,'#27AE60');tx(s,120,94,'creates PVC',8.5,400,'#94a3b8');arrH(s,212,85,250,'#818cf8');rr(s,252,50,200,70,'#0a0a1a','#818cf8',6,1.5);tx(s,352,78,'K8s calls',9.5,700,'#818cf8');tx(s,352,94,'CSI driver API',8.5,400,'#94a3b8');arrH(s,454,85,490,'#818cf8');rr(s,492,50,200,70,'#1a0a00','#F39C12',6,1.5);tx(s,592,78,'CSI driver',9.5,700,'#F39C12');tx(s,592,94,'calls AWS API',8.5,400,'#94a3b8');arrH(s,694,85,720,'#F39C12');rr(s,722,50,70,70,'#0a2a0a','#27AE60',6,1.5);tx(s,757,85,'EBS',10,700,'#27AE60');rr(s,120,180,160,90,'#0a1a0a','#F39C12',6,1.5);tx(s,200,210,'EBS CSI','',400,'');tx(s,200,210,'EBS CSI Driver',10,700,'#F39C12');tx(s,200,226,'ebs.csi.aws.com',8,400,'#94a3b8');tx(s,200,242,'EKS managed add-on',8,400,'#64748b');rr(s,340,180,160,90,'#0a1020','#818cf8',6,1.5);tx(s,420,210,'EFS CSI Driver',10,700,'#818cf8');tx(s,420,226,'efs.csi.aws.com',8,400,'#94a3b8');tx(s,420,242,'EKS managed add-on',8,400,'#64748b');rr(s,60,310,700,50,'#1a0505','#E74C3C',6,1.5);tx(s,410,335,'Without CSI driver installed: PVCs stay Pending forever — storage never provisions',9.5,700,'#E74C3C');}},
{section:'Secrets',title:'Kubernetes Secrets — base64 is NOT encryption',narration:'Kubernetes Secrets store sensitive data. By default they are only base64 encoded and stored in etcd. base64 is NOT encryption — anyone with etcd access can decode them. Enable KMS for real encryption.',render(s){clearSVG(s);rr(s,30,30,500,360,'#03050a','#E74C3C',8,1.5);tx(s,280,55,'Creating a Secret',11,700,'#E74C3C');['$ kubectl create secret generic mysecret \\','  --from-literal=username=admin \\','  --from-literal=password=p@ssw0rd','','$ kubectl get secret mysecret -o yaml','apiVersion: v1','data:','  password: cEBzc3cwcmQK    # ← this is NOT encrypted!','  username: YWRtaW4=         # ← just base64!','kind: Secret','type: Opaque'].forEach((l,i)=>tx(s,50,78+i*22,l,9,400,l.includes('NOT')&&l.includes('←')?'#E74C3C':'#c5e478','start'));rr(s,560,30,220,200,'#2a0505','#E74C3C',8,1.5);tx(s,670,55,'⚠ Security',11,700,'#E74C3C');['base64 ≠ encryption','Anyone with etcd access','can read secrets','Anyone with kubectl','get secret can decode'].forEach((l,i)=>tx(s,670,80+i*24,l,9,400,'#fca5a5'));rr(s,560,250,220,130,'#0a2a0a','#27AE60',8,1.5);tx(s,670,275,'Proper encryption:',10,700,'#27AE60');['Enable envelope','encryption with KMS','in EKS control plane','settings','→ secrets encrypted at rest'].forEach((l,i)=>tx(s,670,298+i*18,l,8.5,400,'#86efac'));}},
{section:'Secrets',title:'ASCP — AWS Secrets Manager for EKS pods',narration:'ASCP mounts secrets from AWS Secrets Manager or SSM Parameter Store directly into pods as files. Supports auto-rotation. Uses IRSA for fine-grained per-pod access control.',render(s){clearSVG(s);tx(s,410,20,'ASCP: AWS Secrets Manager + CSI Driver',11,700,'#27AE60');rr(s,30,45,760,160,'#03050a','#818cf8',8,1.5);tx(s,410,68,'SecretProviderClass YAML',10,700,'#818cf8');['apiVersion: secrets-store.csi.x-k8s.io/v1alpha1','kind: SecretProviderClass','spec:','  provider: aws','  parameters:','    objects: |','        - objectName: "MyDBPassword"','          objectType: "secretsmanager"','          objectAlias: "db-password"'].forEach((l,i)=>tx(s,50,88+i*14,l,8.5,400,'#c5e478','start'));const flow=[{x:110,y:250,l:'SecretProviderClass\ndefines location',c:'#818cf8'},{x:295,y:250,l:'Pod starts +\nmounts CSI volume',c:'#27AE60'},{x:490,y:250,l:'ASCP calls\nSecrets Manager\n(via IRSA)',c:'#F39C12'},{x:680,y:250,l:'Secret file\nmounted at\n/mnt/secrets/',c:'#38bdf8'}];flow.forEach(({x,y,l,c},i)=>{rr(s,x-80,y-30,160,110,c+'08',c,6,1.5);l.split('\n').forEach((ln,j)=>tx(s,x,y-4+j*18,ln,9,700,c));if(i<3)arrH(s,x+82,y+24,x+118,c);});rr(s,60,380,700,60,'#0a2a0a','#27AE60',6,1.5);tx(s,410,403,'Bonus: auto-rotation — when secret rotates in Secrets Manager, pod file updates automatically',9,400,'#86efac');tx(s,410,421,'IRSA scopes access: only pods with annotated SA can read specific secrets',9,700,'#27AE60');}},
{section:'Summary',title:'Module 08 — key takeaways',narration:'StatefulSets for ordered pods. PVC is the user contract, PV is the storage. StorageClass enables dynamic provisioning. EBS = single node, EFS = shared + Fargate. ASCP + IRSA = secure secrets.',render(s){clearSVG(s);tx(s,410,25,'Module 08 Summary',13,700,'#f1f5f9');[['💾 StatefulSet','Ordered pods (mysql-0,1,2). Stable hostname. Each pod owns its PVC.','#818cf8'],['📋 PV/PVC','PV = actual storage. PVC = user request. StorageClass = auto-provision.','#F39C12'],['🔷 EBS','ReadWriteOnce. Single node. gp3 default. NOT Fargate. Per-replica storage.','#38bdf8'],['📁 EFS','ReadWriteMany. Shared. NFSv4. YES Fargate. Auto-elastic. Shared data.','#27AE60'],['⚙️ CSI','ebs.csi.aws.com + efs.csi.aws.com. EKS managed add-ons. Required for PVCs.','#F39C12'],['🔐 ASCP','Secrets Manager → pod file via CSI. Auto-rotation. IRSA for access control.','#E74C3C']].forEach(([icon,desc,c],i)=>{rr(s,40,50+i*72,740,58,c+'08',c,6,1.5);tx(s,60,76+i*72,icon,11,700,c,'start');tx(s,240,76+i*72,desc,10,400,'#94a3b8','start');});}},
];
