window.LAB_CONFIG={badge:'MODULE 05',icon:'📈',title:'Managing Applications at Scale',subtitle:'22-step walkthrough · HPA · VPA · Cluster Autoscaler · Karpenter · CI/CD · GitOps · Argo CD',color1:'rgba(39,174,96,.85)',color2:'rgba(56,189,248,.85)',railLinks:[{href:'index.html',icon:'🏠',title:'Dashboard'},{href:'animated-lab-eks-fundamentals.html',icon:'🔶',title:'EKS Fundamentals'},{href:'animated-lab-deploying-apps.html',icon:'🚀',title:'Deploying Apps'},{href:'../course-flashcards/module-05/index.html',icon:'🃏',title:'Flashcards',active:true}],bottomLinks:[{href:'../course-flashcards/module-05/index.html',label:'🃏 Module 05 Flashcards'},{href:'animated-lab-deploying-apps.html',label:'🚀 Deploying Apps'},{href:'../course-flashcards/index.html',label:'📖 All Modules'}]};
window.LAB_STEPS=[
{section:'Autoscalers Overview',title:'Four Kubernetes autoscalers',narration:'HPA scales pod count, VPA scales pod resources, Cluster Autoscaler scales nodes via ASG, Karpenter scales nodes without ASG. Each solves a different dimension of the scaling problem.',render(s){clearSVG(s);tx(s,410,25,'4 Kubernetes Autoscalers',13,700,'#27AE60');[['HPA\nHorizontal Pod Autoscaler','Scales: Pod COUNT\nTrigger: CPU / memory / custom metrics\nResult: more or fewer pods\nObject: HorizontalPodAutoscaler','#38bdf8',110],['VPA\nVertical Pod Autoscaler','Scales: Pod RESOURCES\nTrigger: historical usage\nResult: bigger/smaller pods\nObject: VerticalPodAutoscaler','#818cf8',330],['CA\nCluster Autoscaler','Scales: NODE COUNT (via ASG)\nTrigger: Pending pods\nResult: more/fewer EC2 nodes\nRequires: pre-defined ASGs','#F39C12',550],['Karpenter\nKarpenter','Scales: NODE COUNT (direct)\nTrigger: Pending pods\nResult: right-sized EC2 directly\nRequires: no ASG needed','#27AE60',740]].forEach(([t,d,c,x])=>{rr(s,x-90,45,180,400,c+'08',c,8,1.5);t.split('\n').forEach((l,i)=>tx(s,x,70+i*18,l,11,i===0?400:700,i===0?'#94a3b8':c));d.split('\n').forEach((l,i)=>tx(s,x,112+i*36,l,9,400,'#94a3b8'));});}},
{section:'Autoscalers Overview',title:'Horizontal vs vertical scaling',narration:'Horizontal scaling adds more instances of the same size. Vertical scaling makes existing instances larger. HPA does horizontal, VPA does vertical. They can be used together with care.',render(s){clearSVG(s);tx(s,220,25,'Horizontal (HPA)',12,700,'#38bdf8');tx(s,220,45,'Add MORE pods',10,400,'#94a3b8');for(let i=0;i<5;i++){rr(s,60+i*66,70,54,100,'#0c2a3a','#38bdf8',5,1.5);tx(s,87+i*66,125,'Pod',8,400,'#94a3b8');}arrH(s,150,200,180,'#38bdf8');tx(s,220,230,'3 pods → 5 pods',10,400,'#94a3b8');
tx(s,590,25,'Vertical (VPA)',12,700,'#818cf8');tx(s,590,45,'Make pods BIGGER',10,400,'#94a3b8');rr(s,520,70,70,80,'#0a0a1a','#818cf8',5,1.5);tx(s,555,115,'Pod',8,400,'#94a3b8');arrV(s,555,160,170,'#818cf8');rr(s,520,175,70,120,'#0a0a1a','#818cf8',5,2);tx(s,555,235,'Pod',8,400,'#94a3b8');tx(s,555,255,'↑ bigger',8,700,'#818cf8');tx(s,590,310,'100m→500m CPU\n128Mi→512Mi mem',9,400,'#94a3b8');}},
{section:'HPA',title:'Horizontal Pod Autoscaler in action',narration:'kubectl autoscale sets up an HPA. When average CPU across pods exceeds 50%, HPA adds pods. When CPU drops, it removes pods. Min and max bounds prevent runaway scaling.',render(s){clearSVG(s);tx(s,410,20,'HPA: kubectl autoscale deployment myapp --cpu-percent=50 --min=3 --max=10',9.5,700,'#38bdf8');const states=[{cpu:'30%',pods:3,label:'Normal'},{cpu:'75%',pods:6,label:'Scale-out'},{cpu:'90%',pods:10,label:'Max reached'},{cpu:'20%',pods:3,label:'Scale-in'}];states.forEach(({cpu,pods,label},si)=>{const bx=40+si*190;rr(s,bx,50,170,380,si===3?'#0a2a0a':'#0c1a2a',si===2?'#F39C12':'#38bdf8',8,1.5);tx(s,bx+85,72,label,10,700,si===2?'#F39C12':'#38bdf8');tx(s,bx+85,90,`CPU: ${cpu}`,9,400,'#94a3b8');for(let p=0;p<pods&&p<10;p++){rr(s,bx+15,105+p*24,140,20,'#0a1a0a','#27AE60',3,1);tx(s,bx+85,119+p*24,'Pod',7.5,400,'#86efac');}if(si<3)arrH(s,bx+172,250,bx+188,'#38bdf8');});}},
{section:'VPA',title:'VPA three components',narration:'vpa-recommender analyzes historical usage and suggests requests/limits. vpa-admission-controller applies recommendations at pod creation. vpa-updater evicts pods to apply new sizing.',render(s){clearSVG(s);tx(s,410,25,'VPA — 3 deployments in kube-system',12,700,'#818cf8');[['vpa-recommender','Watches pod resource usage\nBuilds histogram of CPU+memory\nGenerates recommendations\nDoes NOT change anything','#38bdf8',140],['vpa-admission-controller','Intercepts pod creation\nMutates resource requests\nbased on recommendation\nApplies at pod start only','#818cf8',410],['vpa-updater','Monitors vs recommendation\nEvicts pods when drift large\nNew pod created with right size\nMode: Recreate or InPlaceOrRecreate','#F39C12',680]].forEach(([t,d,c,x])=>{rr(s,x-120,45,240,380,c+'08',c,8,1.5);tx(s,x,72,t,11,700,c);d.split('\n').forEach((l,i)=>tx(s,x,100+i*40,l,9,400,'#94a3b8'));});}},
{section:'Cluster Autoscaler',title:'Cluster Autoscaler scale-out scenario',narration:'3 nodes, ASG max=6. Scale deployment to 10 replicas → 4 pods Pending. CA detects Pending pods, calls ASG to add nodes. Desired goes from 3 to 5. All 10 pods now Running.',render(s){clearSVG(s);tx(s,410,18,'Cluster Autoscaler scale-out',12,700,'#F39C12');const cols=[{lbl:'Start',nodes:3,pending:0,desired:3,c:'#27AE60'},{lbl:'Replicas→10',nodes:3,pending:4,desired:3,c:'#F39C12'},{lbl:'CA adds nodes',nodes:5,pending:0,desired:5,c:'#38bdf8'},{lbl:'All running',nodes:5,pending:0,desired:5,c:'#27AE60'}];cols.forEach(({lbl,nodes,pending,desired,c},si)=>{const bx=20+si*195;tx(s,bx+90,38,lbl,9,700,c);rr(s,bx,50,175,400,c+'06',c,6,1.5);for(let n=0;n<nodes;n++){rr(s,bx+12,68+n*72,150,60,'#0a1a0a','#27AE60',4,1);tx(s,bx+87,92+n*72,`Node${n+1}`,9,700,'#27AE60');tx(s,bx+87,108+n*72,'Running pods',7.5,400,'#64748b');}if(pending>0){rr(s,bx+12,68+nodes*72,150,50,'#1a0a0a','#E74C3C',4,1);tx(s,bx+87,92+nodes*72,`${pending} pods`,9,700,'#E74C3C');tx(s,bx+87,108+nodes*72,'Pending ⏳',7.5,400,'#94a3b8');}tx(s,bx+87,460,`ASG desired: ${desired}`,8,700,c);if(si<3)arrH(s,bx+177,250,bx+193,'#F39C12');});}},
{section:'Cluster Autoscaler',title:'Cluster Autoscaler best practices',narration:'Use auto-discovery so CA finds node groups automatically. Adjust min/max on the ASG directly. Combine On-Demand and Spot with MixedInstancesPolicy. Use Expanders when you have multiple node groups.',render(s){clearSVG(s);tx(s,410,25,'Cluster Autoscaler best practices',12,700,'#F39C12');[['Auto-discovery (preferred)','CA finds node groups automatically via tags\nkubernetes.io/cluster-autoscaler/<cluster-name>: owned\nNo need to list groups in CA config','#38bdf8'],['Adjust min/max on ASG','Change min/max on the Auto Scaling Group directly\nDO NOT edit CA config to change bounds\nConsole or eksctl for node group sizing','#27AE60'],['MixedInstancesPolicy (Spot+OD)','Mix On-Demand base with Spot for cost savings\nSpot can save 70-90% on compute\nCA respects instance type diversity','#F39C12'],['Expanders for multiple node groups','When multiple node groups match: random/most-pods/least-waste\nSet: --expander=least-waste in CA args\nPrevents imbalanced node group usage','#818cf8']].forEach(([t,d,c],i)=>{rr(s,40,50+i*104,740,86,c+'08',c,8,1.5);tx(s,60,74+i*104,t,11,700,c,'start');d.split('\n').forEach((l,j)=>tx(s,60,92+i*104+j*16,l,9,400,'#94a3b8','start'));});}},
{section:'Karpenter',title:'Karpenter vs Cluster Autoscaler',narration:'CA uses pre-defined ASGs and is a two-step process. Karpenter bypasses ASGs entirely, provisions EC2 directly via Fleet API, and can pick the exact right instance type for the pending pods.',render(s){clearSVG(s);tx(s,220,25,'Cluster Autoscaler',12,700,'#F39C12');rr(s,30,45,360,420,'#1a0a00','#F39C12',10,1.5);[['Pre-defined ASGs required'],['Fixed instance type per group'],['2-step: CA → ASG → EC2'],['Slower (~3-5 min)'],['Scale-up on Pending pods'],['Scale-in after 10min idle'],['Expanders for multi-group']].forEach(([l],i)=>{rr(s,50,68+i*50,320,38,'#2a1a0a','#F39C12',4,1);tx(s,210,90+i*50,l,9.5,400,'#f1f5f9');});tx(s,590,25,'Karpenter',12,700,'#27AE60');rr(s,440,45,340,420,'#0a1a00','#27AE60',10,1.5);[['NO ASGs required'],['Right-sized instance chosen dynamically'],['1-step: Karpenter → EC2 Fleet API'],['Faster (~60 sec)'],['Scale-up on Pending pods'],['Consolidates underutilised nodes'],['NodePools define constraints']].forEach(([l],i)=>{rr(s,460,68+i*50,300,38,'#0a2a0a','#27AE60',4,1);tx(s,610,90+i*50,l,9.5,400,'#f1f5f9');});}},
{section:'Karpenter',title:'Karpenter provisioning — right-sized nodes',narration:'6 pods need 1 CPU each = 6 CPUs total. With topology constraints spread across 3 AZs = 2 CPUs per AZ. Karpenter picks the optimal instance type (c5.xlarge = 4 vCPU) per AZ and provisions directly.',render(s){clearSVG(s);tx(s,410,20,'Karpenter: 6 pods × 1 CPU + spread across 3 AZs',11,700,'#27AE60');rr(s,30,45,220,80,'#0a1a0a','#27AE60',8,1.5);tx(s,140,70,'6 Pending Pods',12,700,'#27AE60');tx(s,140,86,'each needs 1 CPU',9,400,'#94a3b8');arrH(s,252,85,295,'#27AE60');rr(s,298,45,180,80,'#0c2a3a','#38bdf8',8,1.5);tx(s,388,70,'Karpenter',11,700,'#38bdf8');tx(s,388,86,'calculates need',9,400,'#94a3b8');arrH(s,480,85,519,'#38bdf8');rr(s,522,45,250,80,'#0a1020','#818cf8',8,1.5);tx(s,647,70,'EC2 Fleet API',11,700,'#818cf8');tx(s,647,86,'c5.xlarge per AZ',9,400,'#94a3b8');[['us-east-1a',150,180,2],['us-east-1b',380,180,2],['us-east-1c',610,180,2]].forEach(([az,x,y,pods])=>{rr(s,x-100,y-20,200,180,'#0a1a0a','#27AE60',8,1.5);tx(s,x,y+4,az,10,700,'#27AE60');rr(s,x-80,y+20,160,40,'#1a2a3a','#38bdf8',5,1);tx(s,x,y+44,'c5.xlarge (4 vCPU)',8.5,400,'#94a3b8');for(let p=0;p<pods;p++){rr(s,x-80+p*84,y+72,72,52,'#0a2a0a','#27AE60',4,1);tx(s,x-44+p*84,y+102,'Pod ✓',8,700,'#86efac');}});}},
{section:'CI/CD',title:'CI/CD pipeline stages',narration:'A complete CI/CD pipeline has 8 stages. CI covers Plan through Test. CD covers Release through Monitor. EKS lives in the Deploy stage. Code change to production in minutes.',render(s){clearSVG(s);tx(s,410,20,'CI/CD Pipeline — 8 stages',12,700,'#27AE60');const stages=[['Plan','Jira/Linear\nrequirements','#94a3b8'],['Code','Git commit\nPR review','#38bdf8'],['Build','docker build\npush to ECR','#F39C12'],['Test','unit, integration\nsecurity scan','#818cf8'],['Release','tag image\nhelm package','#27AE60'],['Deploy','kubectl apply\nHelm upgrade\n→ EKS','#E74C3C'],['Operate','kubectl logs\nCloudWatch','#38bdf8'],['Monitor','Prometheus\nGrafana\nX-Ray','#818cf8']];stages.forEach(({0:t,1:d,2:c},i)=>{const x=45+i*94;rr(s,x,40,84,320,c+'08',c,6,1.5);tx(s,x+42,62,t,10,700,c);d.split('\n').forEach((l,j)=>tx(s,x+42,84+j*22,l,8,400,'#94a3b8'));if(i<7)arrH(s,x+86,200,x+93,c);});rr(s,200,390,420,50,'#0a1a0a','#27AE60',8,1.5);tx(s,410,413,'CI → CD boundary',9,700,'#94a3b8');ln(s,410,42,410,380,'#1f2738');tx(s,200,415,'CI: Plan→Test',9,400,'#38bdf8');tx(s,600,415,'CD: Release→Monitor',9,400,'#27AE60');}},
{section:'GitOps',title:'GitOps four principles',narration:'Git is the single source of truth. Everything is declarative, not imperative. Approved changes are applied automatically. Software agents detect and reconcile any drift from the desired state.',render(s){clearSVG(s);tx(s,410,25,'GitOps: 4 principles',13,700,'#818cf8');[['Git as single source of truth','All cluster config lives in Git.\nNothing deployed without a Git commit.\nEven infrastructure config = code.','#38bdf8'],['Declarative, not imperative','Manifests describe WHAT you want, not HOW.\nGit stores the desired state.\nAgents figure out how to get there.','#818cf8'],['Approved changes applied automatically','No manual kubectl apply.\nMerge to main → Argo CD/Flux syncs.\nPR review IS the approval process.','#27AE60'],['Software agents ensure consistency','Argo CD watches Git and cluster continuously.\nDetects drift (someone ran kubectl edit).\nAuto-reverts to Git state within minutes.','#F39C12']].forEach(([t,d,c],i)=>{rr(s,40,52+i*110,740,92,c+'08',c,8,1.5);tx(s,60,76+i*110,t,11,700,c,'start');d.split('\n').forEach((l,j)=>tx(s,60,96+i*110+j*16,l,9,400,'#94a3b8','start'));});}},
{section:'GitOps',title:'Argo CD — scenario 1: app code change',narration:'Developer commits code → CI builds and pushes new image to ECR → CI updates image tag in manifest repo → Argo CD detects the change → syncs cluster → rolling update starts → new pods running.',render(s){clearSVG(s);tx(s,410,20,'GitOps flow: application code change',11,700,'#818cf8');const flow=[['Developer\ncommits code','Git\napp repo','#38bdf8',60],['CI builds\ndocker image','ECR\npush','#F39C12',200],['CI updates\nmanifest repo','Git\nconfig repo','#27AE60',340],['Argo CD\ndetects diff','cluster desired\nvs actual','#818cf8',480],['Rolling\nupdate','new pods\nrunning ✓','#27AE60',620],['Monitor','metrics\n& logs','#94a3b8',740]];flow.forEach(([t,sub,c,x],i)=>{rr(s,x-50,50,100,100,c+'08',c,6,1.5);t.split('\n').forEach((l,j)=>tx(s,x,72+j*18,l,9,700,c));sub.split('\n').forEach((l,j)=>tx(s,x,110+j*14,l,8,400,'#94a3b8'));if(i<5)arrH(s,x+52,100,x+68,'#475569');});rr(s,60,200,720,80,'#0a1020','#818cf8',8,1.5);tx(s,410,228,'Git commit → ECR image → manifest updated → Argo syncs → cluster updated',10,400,'#94a3b8');tx(s,410,246,'All changes traceable in Git history. Rollback = revert commit.',10,700,'#27AE60');}},
{section:'GitOps',title:'Argo CD — scenario 2: unauthorized change detected',narration:'Someone runs kubectl edit directly, bypassing Git. Argo CD detects the cluster state has drifted from Git. Within minutes it reverts the change back to the Git state. This is the key GitOps superpower.',render(s){clearSVG(s);tx(s,410,20,'GitOps: drift detection and auto-revert',11,700,'#E74C3C');rr(s,30,45,350,120,'#0a1020','#27AE60',8,1.5);tx(s,205,70,'Git (source of truth)',11,700,'#27AE60');tx(s,205,88,'replicas: 3',9,400,'#94a3b8');tx(s,205,104,'image: my-app:1.2',9,400,'#94a3b8');rr(s,440,45,340,120,'#1a0a0a','#E74C3C',8,1.5);tx(s,610,70,'Cluster (drifted)',11,700,'#E74C3C');tx(s,610,88,'replicas: 10 ← manual change',9,700,'#E74C3C');tx(s,610,104,'kubectl edit deployment → bypassed Git',8,400,'#94a3b8');rr(s,200,205,420,80,'#0a0a1a','#818cf8',8,1.5);tx(s,410,230,'Argo CD detects drift',11,700,'#818cf8');tx(s,410,248,'desired (Git) ≠ actual (cluster)',9,400,'#94a3b8');arrV(s,410,170,204,'#E74C3C');arrV(s,610,167,204,'#E74C3C');arrV(s,410,287,320,'#818cf8');rr(s,200,325,420,80,'#0a2a0a','#27AE60',8,2);tx(s,410,352,'Auto-sync: reverts to Git state ✓',12,700,'#27AE60');tx(s,410,368,'replicas back to 3 within minutes',9,400,'#86efac');rr(s,60,440,700,55,'#1a0505','#E74C3C',8,1.5);tx(s,410,463,'⚠ Never use kubectl edit or kubectl patch on GitOps-managed resources',10,700,'#E74C3C');tx(s,410,479,'Always change manifests in Git → let Argo CD apply them',9,400,'#94a3b8');}},
{section:'Summary',title:'Module 05 — key takeaways',narration:'Pod scaling: HPA (count) + VPA (resources). Node scaling: CA (via ASG) vs Karpenter (no ASG, faster, right-sized). CI/CD automates build-test-deploy. GitOps = Git as truth + auto-revert drift.',render(s){clearSVG(s);tx(s,410,25,'Module 05 Summary',13,700,'#f1f5f9');[['📈 HPA','Scales pod COUNT on CPU/memory/custom metrics. --min/--max bounds.','#38bdf8'],['⬆️ VPA','Scales pod RESOURCES. Three modes. Runs 3 pods: recommender/updater/admission.','#818cf8'],['🔵 Cluster Autoscaler','Scales nodes via ASG. Pending pods trigger scale-up. Auto-discovery recommended.','#F39C12'],['⚡ Karpenter','Bypasses ASG. Right-sized instances. Faster. do-not-evict for critical pods.','#27AE60'],['🔄 CI/CD','8 stages: Plan→Code→Build→Test→Release→Deploy→Operate→Monitor.','#94a3b8'],['🌿 GitOps','Git = source of truth. Argo CD detects drift and auto-reverts. Key exam: drift detection.','#818cf8']].forEach(([icon,desc,c],i)=>{rr(s,40,50+i*72,740,58,c+'08',c,6,1.5);tx(s,60,76+i*72,icon,11,700,c,'start');tx(s,240,76+i*72,desc,10,400,'#94a3b8','start');});}},
];
