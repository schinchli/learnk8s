window.LAB_STEPS=[
{section:'Observability Basics',title:'Observability vs monitoring',narration:'Monitoring tells you WHEN something is wrong via dashboards and alerts. Observability tells you WHY using metrics, logs, and traces together. It is a measure of how well you can understand a system from its output.',render(s){clearSVG(s);rr(s,30,40,340,380,'#0c1a2a','#38bdf8',10,1.5);tx(s,200,65,'Monitoring',12,700,'#38bdf8');['CPU: 95%  ⚠','Memory: 87%  ⚠','Error rate: 12%  ⚠','Response time: 2s  ⚠'].forEach((l,i)=>{rr(s,50,88+i*66,300,52,'#0a1a2a','#E74C3C',5,1);tx(s,200,118+i*66,l,10,400,'#f1f5f9');});tx(s,200,365,'Tells you WHEN → "something is wrong"',8.5,700,'#38bdf8');rr(s,440,40,340,380,'#0a1a0a','#27AE60',10,1.5);tx(s,610,65,'Observability',12,700,'#27AE60');['Metric: CPU spike at 14:32:01','Log: OOMKill on pod auth-7fd9','Trace: auth→db took 1.8s of 2s','Root cause: missing DB index ✓'].forEach((l,i)=>{rr(s,460,88+i*66,300,52,'#0a2a0a','#27AE60',5,1);tx(s,610,118+i*66,l,9.5,400,'#f1f5f9');});tx(s,610,365,'Tells you WHY → root cause analysis',8.5,700,'#27AE60');}},
{section:'Observability Basics',title:'The three pillars',narration:'Metrics are numerical time-series measurements. Logs are discrete event records. Traces show the full request journey across services. You need all three for complete observability.',render(s){clearSVG(s);tx(s,410,20,'Three pillars of observability',12,700,'#f1f5f9');[[140,'📊 METRICS','Numerical time-series\nCPU, memory, req/sec\nerror rate, latency\nGood for: dashboards,\nalerts, autoscaling','#38bdf8'],[410,'📝 LOGS','Discrete event records\nTimestamped text output\nERROR messages, traces\nGood for: debugging,\naudit, compliance','#27AE60'],[680,'🔍 TRACES','End-to-end request flow\nSpans across services\nLatency per hop\nGood for: perf root\ncause, dep mapping','#818cf8']].forEach(([x,t,d,c])=>{rr(s,x-120,45,240,420,c+'08',c,10,2);t.split(' ').slice(1).forEach((_,i,arr)=>{if(i===0)tx(s,x,72,t.split(' ').slice(0,2).join(' '),12,700,c);});tx(s,x,75,t,12,700,c);d.split('\n').forEach((l,i)=>tx(s,x,105+i*36,l,9.5,400,'#94a3b8'));});}},
{section:'Metrics',title:'Prometheus — scrape, store, query',narration:'Apps expose metrics at /metrics in Prometheus format. Prometheus scrapes those endpoints on a schedule. PromQL lets you query the data. Grafana visualises it.',render(s){clearSVG(s);tx(s,410,20,'Prometheus architecture',12,700,'#38bdf8');rr(s,30,45,180,80,'#0a1a0a','#27AE60',8,1.5);tx(s,120,78,'App pods',11,700,'#27AE60');tx(s,120,94,'/metrics endpoint',8.5,400,'#94a3b8');arrH(s,212,85,270,'#38bdf8');tx(s,240,72,'scrape',8,700,'#38bdf8');rr(s,272,45,200,80,'#0c2a3a','#38bdf8',8,1.5);tx(s,372,78,'Prometheus',11,700,'#38bdf8');tx(s,372,94,'stores TSDB',8.5,400,'#94a3b8');arrH(s,474,85,530,'#38bdf8');rr(s,532,45,200,80,'#0a0a2a','#818cf8',8,1.5);tx(s,632,78,'PromQL',11,700,'#818cf8');tx(s,632,94,'query language',8.5,400,'#94a3b8');arrV(s,632,127,165,'#818cf8');rr(s,532,167,200,80,'#0a1a2a','#F39C12',8,1.5);tx(s,632,200,'Grafana',11,700,'#F39C12');tx(s,632,216,'visualize dashboards',8.5,400,'#94a3b8');rr(s,30,200,180,80,'#0a1020','#94a3b8',8,1.5);tx(s,120,233,'AlertManager',11,700,'#94a3b8');tx(s,120,249,'PagerDuty/Slack',8.5,400,'#64748b');arrH(s,212,240,270,'#94a3b8');arrV(s,372,127,200,'#94a3b8');rr(s,30,350,740,80,'#03050a','#27AE60',6,1.5);tx(s,50,370,'$ kubectl get --raw /metrics',10.5,700,'#c5e478','start');tx(s,50,390,'rest_client_requests_total{code="200",method="POST"} 4994  ← Prometheus format',9.5,400,'#86efac','start');}},
{section:'Metrics',title:'CloudWatch Container Insights',narration:'AWS-native alternative to Prometheus+Grafana. The Container Insights agent collects metrics at cluster, node, pod, and container level. Set CloudWatch alarms and view in Container Insights console.',render(s){clearSVG(s);tx(s,410,20,'CloudWatch Container Insights',12,700,'#F39C12');rr(s,30,45,280,140,'#0c2a3a','#38bdf8',8,1.5);tx(s,170,68,'EKS Cluster',10,700,'#38bdf8');['Node DaemonSet agent','kubelet stats','Container metrics'].forEach((l,i)=>tx(s,170,92+i*18,l,8.5,400,'#94a3b8'));arrH(s,312,115,360,'#F39C12');rr(s,362,45,380,140,'#1a0a00','#F39C12',8,1.5);tx(s,552,68,'CloudWatch',11,700,'#F39C12');tx(s,552,86,'Container Insights',10,700,'#F39C12');['Cluster level metrics','Node level metrics','Pod level metrics','Task+container level'].forEach((l,i)=>tx(s,552,108+i*18,l,8.5,400,'#94a3b8'));arrV(s,552,187,225,'#F39C12');rr(s,362,227,380,120,'#1a0a00','#F39C12',8,1.5);tx(s,552,252,'CloudWatch Alarms',10,700,'#F39C12');tx(s,552,270,'CPU > 80%: page oncall',8.5,400,'#94a3b8');tx(s,552,288,'Memory < 200Mi: scale alert',8.5,400,'#94a3b8');rr(s,30,240,280,140,'#0a0a1a','#475569',8,1.5);tx(s,170,263,'Prometheus+Grafana',10,700,'#475569');tx(s,170,281,'More flexible, PromQL',8.5,400,'#94a3b8');tx(s,170,299,'Requires setup+maintenance',8.5,400,'#94a3b8');tx(s,170,317,'Open-source ecosystem',8.5,400,'#94a3b8');}},
{section:'Logs',title:'Control plane log types',narration:'EKS control plane logs are disabled by default. You can enable any combination of the five types. They go to CloudWatch log groups named /aws/eks/cluster-name/cluster.',render(s){clearSVG(s);tx(s,410,20,'EKS Control plane log types — disabled by default',11,700,'#27AE60');[['API Server','All requests to K8s API (get/create/delete). Largest volume. Very detailed.','#38bdf8'],['Audit','Who did what when. Security+compliance. JSON-structured audit events.','#E74C3C'],['Authenticator','IAM token validation. Useful for auth debugging.','#818cf8'],['Controller Manager','ReplicaSet, Deployment reconciliation events. Pod creation decisions.','#F39C12'],['Scheduler','Pod placement decisions. Why pods ended up on which nodes.','#27AE60']].forEach(([t,d,c],i)=>{rr(s,40,44+i*96,740,80,c+'08',c,6,1.5);tx(s,60,70+i*96,t,11,700,c,'start');tx(s,60,88+i*96,d,9.5,400,'#94a3b8','start');tx(s,700,70+i*96,'OFF by default',8,700,'#E74C3C');});rr(s,60,528,700,40,'#03050a','#27AE60',5,1.5);tx(s,410,551,'Log group: /aws/eks/my-cluster/cluster — each type is a separate stream',9,400,'#c5e478');}},
{section:'Logs',title:'Container log routing — Fluent Bit',narration:'Fluent Bit runs as a DaemonSet (one per node). It reads container logs from the node filesystem. Routes to destinations: OpenSearch, S3, CloudWatch Logs, or Kinesis Firehose.',render(s){clearSVG(s);tx(s,410,20,'Fluent Bit log routing pipeline',12,700,'#27AE60');rr(s,30,45,200,80,'#0a2a0a','#27AE60',8,1.5);tx(s,130,78,'Container',11,700,'#27AE60');tx(s,130,94,'stdout/stderr',8.5,400,'#94a3b8');arrV(s,130,127,165,'#27AE60');rr(s,30,167,200,80,'#0a1a0a','#27AE60',5,1);tx(s,130,200,'Node filesystem',10,700,'#27AE60');tx(s,130,216,'/var/log/containers/',8,400,'#64748b');arrH(s,232,207,290,'#27AE60');rr(s,292,167,200,80,'#0c2a3a','#38bdf8',8,1.5);tx(s,392,200,'Fluent Bit',11,700,'#38bdf8');tx(s,392,216,'DaemonSet pod',8.5,400,'#94a3b8');[[560,90,'Amazon OpenSearch','search + kibana dashboard','#818cf8'],[560,190,'Amazon S3','long-term storage + Athena','#F39C12'],[560,290,'CloudWatch Logs','alarms + insights queries','#27AE60'],[560,390,'Kinesis Firehose','real-time streaming pipeline','#38bdf8']].forEach(([x,y,d,s2,c])=>{arrH(s,494,207,x-60,'#38bdf8');rr(s,x-50,y-20,220,64,c+'08',c,5,1);tx(s,x+60,y+4,d,9.5,700,c);tx(s,x+60,y+20,s2,8,400,'#94a3b8');});}},
{section:'Logs',title:'Fargate log routing — special setup',narration:'Fargate pods have no node agent. Configure logging via a ConfigMap in the aws-observability namespace. This tells Fargate where to route logs using Fluent Bit output plugin config.',render(s){clearSVG(s);rr(s,30,30,480,480,'#03050a','#27AE60',8,1.5);tx(s,270,55,'Fargate log routing setup',11,700,'#27AE60');const yaml1=['# Step 1: Create namespace','kind: Namespace','apiVersion: v1','metadata:','  name: aws-observability','  labels:','    aws-observability: enabled'];yaml1.forEach((l,i)=>tx(s,50,78+i*22,l,9,400,'#c5e478','start'));const yaml2=['# Step 2: Create ConfigMap','kind: ConfigMap','apiVersion: v1','metadata:','  name: aws-logging','  namespace: aws-observability','data:','  output.conf: |','    [OUTPUT]','    Name  data_firehose','    Match *','    region us-west-2','    delivery_stream my-stream'];yaml2.forEach((l,i)=>tx(s,50,248+i*20,l,9,400,'#86efac','start'));rr(s,540,30,240,200,'#0c2a3a','#38bdf8',8,1.5);tx(s,660,55,'Why special?',11,700,'#38bdf8');['No node to run DaemonSet','No log files on disk','Fluent Bit built into Fargate','Configured via ConfigMap','aws-observability namespace','= magic label for EKS Fargate'].forEach((l,i)=>tx(s,660,80+i*22,l,9,400,'#94a3b8'));rr(s,540,250,240,180,'#0a1020','#F39C12',8,1.5);tx(s,660,275,'Output destinations',10,700,'#F39C12');['Amazon S3','Amazon Firehose','CloudWatch Logs','Amazon OpenSearch'].forEach((l,i)=>tx(s,660,300+i*22,l,9,400,'#94a3b8'));}},
{section:'Tracing',title:'Distributed tracing — why logs alone fail',narration:'In microservices, a 500ms slow response could be in any of 10 services. Logs show each service ran. Traces show the full timeline — which call took how long, and where the bottleneck is.',render(s){clearSVG(s);tx(s,410,20,'Without tracing: 500ms response — WHERE is the problem?',11,700,'#E74C3C');const svcs=[['User','0ms'],['Frontend','50ms'],['Auth','20ms'],['Products','30ms'],['Inventory','350ms'],['Cart','20ms'],['DB','30ms']];svcs.forEach(([svc,dur],i)=>{const c=svc==='Inventory'?'#E74C3C':'#27AE60';const w=parseInt(dur)*1.4+40;rr(s,60+i*100,60,90,50,c+'08',c,5,1.5);tx(s,105+i*100,79,svc,8.5,700,c);tx(s,105+i*100,95,dur,8,400,'#94a3b8');});tx(s,410,140,'Trace timeline:',10,700,'#38bdf8');svcs.forEach(([svc,dur],i)=>{const c=svc==='Inventory'?'#E74C3C':'#27AE60';const start=i*95+60,w=parseInt(dur)*1.3+40;rr(s,start,160,85,30,c+'08',c,3,1);tx(s,start+42,180,dur,8,700,c);});rr(s,60+4*100,160,parseInt('350')*1.3/3+40,30,'#E74C3C','#E74C3C',3,2);rr(s,200,210,420,70,'#1a0505','#E74C3C',8,1.5);tx(s,410,236,'Bottleneck identified: Inventory service (350ms of 500ms total)',11,700,'#E74C3C');tx(s,410,254,'Root cause: missing database index in inventory query',9,400,'#94a3b8');}},
{section:'Tracing',title:'ADOT + AWS X-Ray architecture',narration:'AWS Distro for OpenTelemetry (ADOT) collects spans from your apps. The ADOT collector runs as a DaemonSet or sidecar. It forwards traces to AWS X-Ray for service map visualization.',render(s){clearSVG(s);tx(s,410,20,'ADOT + X-Ray — distributed tracing',12,700,'#818cf8');rr(s,30,45,200,100,'#0a1a0a','#27AE60',8,1.5);tx(s,130,75,'Your App',11,700,'#27AE60');tx(s,130,91,'OpenTelemetry SDK',8.5,400,'#94a3b8');tx(s,130,107,'emits spans',8,400,'#64748b');arrH(s,232,95,270,'#818cf8');rr(s,272,45,200,100,'#0a0a1a','#818cf8',8,1.5);tx(s,372,75,'ADOT Collector',11,700,'#818cf8');tx(s,372,91,'DaemonSet or sidecar',8.5,400,'#94a3b8');tx(s,372,107,'collects + batches',8,400,'#64748b');arrH(s,474,95,520,'#818cf8');rr(s,522,45,250,100,'#0c1a2a','#38bdf8',8,1.5);tx(s,647,75,'AWS X-Ray',11,700,'#38bdf8');tx(s,647,91,'receives traces',8.5,400,'#94a3b8');tx(s,647,107,'service map + analysis',8,400,'#64748b');rr(s,272,200,500,280,'#0a0a1a','#F39C12',8,1.5);tx(s,522,224,'X-Ray Service Map',11,700,'#F39C12');[['frontend → auth','45ms avg  1% error'],['auth → products','12ms avg  0% error'],['products → inventory','350ms avg  0% error ← SLOW'],['inventory → db','320ms avg  0% error']].forEach(([s2,m],i)=>{rr(s,292,242+i*44,460,36,'#1a1a00','#F39C12',4,1);tx(s,300,263+i*44,s2,9,700,'#F39C12','start');tx(s,500,263+i*44,m,8.5,400,'#94a3b8','start');});}},
{section:'Summary',title:'Module 07 — key takeaways',narration:'Observability = metrics + logs + traces. Prometheus for metrics (open-source), CloudWatch Container Insights (managed AWS). Fluent Bit for log routing. ADOT+X-Ray for tracing. Fargate logging needs special ConfigMap.',render(s){clearSVG(s);tx(s,410,25,'Module 07 Summary',13,700,'#f1f5f9');[['🔭 Observability','Monitoring = WHEN. Observability = WHY. Need all 3 pillars.','#38bdf8'],['📊 Prometheus','Scrapes /metrics endpoints. PromQL. Grafana for visualization.','#27AE60'],['☁️ Container Insights','AWS-managed. Cluster/node/pod/container aggregation. CloudWatch alarms.','#F39C12'],['📝 Fluent Bit','DaemonSet log router → OpenSearch/S3/CloudWatch/Firehose. 5 control plane log types.','#27AE60'],['🌿 Fargate logs','aws-observability namespace + ConfigMap. No DaemonSet needed.','#818cf8'],['🔍 X-Ray + ADOT','Distributed tracing. Service map. Latency per service hop.','#94a3b8']].forEach(([icon,desc,c],i)=>{rr(s,40,50+i*72,740,58,c+'08',c,6,1.5);tx(s,60,76+i*72,icon,11,700,c,'start');tx(s,240,76+i*72,desc,10,400,'#94a3b8','start');});}},
];
