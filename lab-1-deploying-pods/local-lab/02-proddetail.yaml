apiVersion: apps/v1
kind: Deployment
metadata:
  name: proddetail
  namespace: workshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proddetail
  template:
    metadata:
      labels:
        app: proddetail
    spec:
      containers:
        - name: proddetail
          image: hashicorp/http-echo:latest
          args:
            - "-text=hello from proddetail (catalog detail service)"
            - "-listen=:3000"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: proddetail
  namespace: workshop
  labels:
    app: proddetail
  annotations:
    owner: student
spec:
  type: ClusterIP
  ports:
    - port: 3000
      name: http
  selector:
    app: proddetail
