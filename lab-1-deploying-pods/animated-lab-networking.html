{section:'AWS Networking',title:'VPC for EKS — public and private subnets',narration:'Your EKS cluster lives in a VPC. Best practice: worker nodes and pods in private subnets (no direct internet). Load balancers in public subnets. Control plane ENI injected by AWS.',render(s){clearSVG(s);rr(s,30,30,760,480,'#0a0f18','#818cf8',12,1.5);tx(s,410,55,'VPC: 10.0.0.0/16',12,700,'#818cf8');[[100,'Public Subnet\n10.0.0.0/24\nus-east-1a','#F39C12'],[400,'Public Subnet\n10.0.1.0/24\nus-east-1b','#F39C12']].forEach(([x,t,c])=>{rr(s,x-60,75,170,140,c+'08',c,6,1.5);t.split('\n').forEach((l,i)=>tx(s,x+25,96+i*18,l,8.5,i===0?700:400,i===0?c:'#94a3b8'));rr(s,x-40,155,130,44,'#1a1a00','#F39C12',4,1);tx(s,x+25,180,'Load Balancer',8.5,700,'#F39C12');});[[100,'Private Subnet\n10.0.2.0/24\nus-east-1a','#27AE60'],[400,'Private Subnet\n10.0.3.0/24\nus-east-1b','#27AE60']].forEach(([x,t,c])=>{rr(s,x-60,250,170,220,c+'08',c,6,1.5);t.split('\n').forEach((l,i)=>tx(s,x+25,272+i*18,l,8.5,i===0?700:400,i===0?c:'#94a3b8'));rr(s,x-40,310,130,44,'#0a1a0a','#27AE60',4,1);tx(s,x+25,335,'Worker Node',8.5,700,'#27AE60');rr(s,x-40,365,130,44,'#0a1a0a','#27AE60',4,1);tx(s,x+25,390,'Pod: 10.0.x.y',8.5,400,'#86efac');});rr(s,590,75,160,160,'#0c2a3a','#38bdf8',6,1.5);tx(s,670,108,'EKS Control Plane',9,700,'#38bdf8');tx(s,670,124,'AWS-managed account',7.5,400,'#64748b');tx(s,670,142,'ENI injected',8,400,'#94a3b8');tx(s,670,158,'into your VPC',8,400,'#94a3b8');}},
{section:'Pod Networking',title:'Three communication patterns in EKS',narration:'Container-to-container within a pod uses localhost. Pod-to-pod on the same node uses Linux veth pairs. Pod-to-pod across nodes uses the VPC CNI plugin which assigns real VPC IPs to pods.',render(s){clearSVG(s);tx(s,410,20,'Three communication types in EKS',12,700,'#38bdf8');[[140,'Container → Container\n(within same Pod)','localhost:port\nShared network namespace\nNo network hop needed','#38bdf8'],[410,'Pod → Pod\n(same node)','Linux veth pairs\nvia node bridge\nNo VPC routing needed','#27AE60'],[680,'Pod → Pod\n(different nodes)','Amazon VPC CNI\nReal VPC IP per pod\nNative VPC routing','#818cf8']].forEach(([x,t,d,c])=>{rr(s,x-120,45,240,380,c+'08',c,8,1.5);t.split('\n').forEach((l,i)=>tx(s,x,72+i*18,l,11,i===0?400:700,i===0?'#94a3b8':c));d.split('\n').forEach((l,i)=>tx(s,x,120+i*36,l,9.5,400,'#94a3b8'));});}},
{section:'Pod Networking',title:'VPC CNI — pods get real VPC IPs',narration:'The Amazon VPC CNI plugin assigns VPC secondary IP addresses directly to pods. Pod on Node A (10.0.1.5) can reach Pod on Node B (10.0.2.8) directly via VPC routing — no overlay, no encapsulation.',render(s){clearSVG(s);tx(s,410,20,'Amazon VPC CNI — pods are first-class VPC citizens',11,700,'#27AE60');rr(s,30,45,340,380,'#0a1a0a','#27AE60',8,1.5);tx(s,200,68,'Node A (10.0.1.0/24)',10,700,'#27AE60');rr(s,50,85,300,80,'#0a2a0a','#27AE60',5,1);tx(s,200,108,'Pod 1: 10.0.1.5',10,700,'#86efac');tx(s,200,124,'nginx container',8.5,400,'#94a3b8');rr(s,50,180,300,80,'#0a2a0a','#27AE60',5,1);tx(s,200,203,'Pod 2: 10.0.1.6',10,700,'#86efac');rr(s,50,275,300,60,'#0a1a2a','#38bdf8',5,1);tx(s,200,298,'ENI: 10.0.1.0/24',9,700,'#38bdf8');tx(s,200,314,'secondary IPs: .5,.6,.7,...',8,400,'#94a3b8');rr(s,450,45,310,380,'#0a1a0a','#27AE60',8,1.5);tx(s,605,68,'Node B (10.0.2.0/24)',10,700,'#27AE60');rr(s,470,85,270,80,'#0a2a0a','#27AE60',5,1);tx(s,605,108,'Pod 3: 10.0.2.8',10,700,'#86efac');tx(s,605,124,'target service',8.5,400,'#94a3b8');rr(s,470,275,270,60,'#0a1a2a','#38bdf8',5,1);tx(s,605,298,'ENI: 10.0.2.0/24',9,700,'#38bdf8');arr(s,352,125,468,112,'#F39C12');tx(s,410,148,'Direct VPC route — no overlay!',9,700,'#F39C12');rr(s,200,460,420,45,'#0a2a0a','#27AE60',6,1.5);tx(s,410,480,'vs overlay (Flannel): add encapsulation header, extra hop, more latency',8.5,400,'#94a3b8');}},
{section:'Network Policies',title:'Default-deny then selective allow',narration:'Without a NetworkPolicy, all pods can reach all pods. Apply a default-deny to lock it down, then add specific allow rules. This implements zero-trust networking inside the cluster.',render(s){clearSVG(s);tx(s,410,20,'Network Policies: default-deny + selective allow',11,700,'#E74C3C');rr(s,30,45,210,340,'#0a0f18','#475569',8,1);tx(s,135,65,'Before: open',10,700,'#475569');['nginx','webapp','redis','admin'].forEach((p,i)=>{rr(s,50,82+i*62,170,48,'#0a1020','#475569',5,1);tx(s,135,110+i*62,p,10,400,'#94a3b8');});ln(s,135,82,135,390,'#27AE60');tx(s,135,410,'any→any ✓',8,700,'#27AE60');
rr(s,270,45,220,340,'#1a0505','#E74C3C',8,1.5);tx(s,380,65,'default-deny',10,700,'#E74C3C');['nginx','webapp','redis','admin'].forEach((p,i)=>{rr(s,290,82+i*62,180,48,'#2a0808','#E74C3C',5,1);tx(s,380,110+i*62,p,10,400,'#fca5a5');});tx(s,380,410,'all blocked ✗',8,700,'#E74C3C');
rr(s,520,45,250,340,'#0a1a0a','#27AE60',8,1.5);tx(s,645,65,'allow nginx→webapp',10,700,'#27AE60');['nginx','webapp','redis','admin'].forEach((p,i)=>{const c=i<2?'#27AE60':'#475569';rr(s,540,82+i*62,210,48,c+'08',c,5,1);tx(s,645,110+i*62,p,10,400,c);});arr(s,645,130,645,164,'#27AE60');tx(s,645,410,'nginx→webapp ✓ rest blocked ✗',8,700,'#27AE60');}},
{section:'Services',title:'Four Service types — overview',narration:'ClusterIP is internal only. NodePort exposes on every node port. LoadBalancer provisions an AWS NLB or ALB. ExternalName is a DNS alias to an external service.',render(s){clearSVG(s);tx(s,410,25,'Kubernetes Service types',13,700,'#38bdf8');[['ClusterIP\n(default)','Internal cluster only\nStable virtual IP\nkube-proxy routes\nscope: cluster-internal','#38bdf8',110],['NodePort','Port on every node\nExternal via node IP\n30000-32767 range\nWraps ClusterIP','#F39C12',310],['LoadBalancer','Provisions AWS NLB/ALB\nFully external access\nAuto-creates cloud LB\nWraps NodePort','#27AE60',510],['ExternalName','DNS CNAME alias\nNo proxying\nMaps to external DNS\ne.g. my.rds.endpoint','#818cf8',710]].forEach(([t,d,c,x])=>{rr(s,x-90,45,180,380,c+'08',c,8,1.5);t.split('\n').forEach((l,i)=>tx(s,x,70+i*18,l,11,i===0?400:700,i===0?'#94a3b8':c));d.split('\n').forEach((l,i)=>tx(s,x,116+i*36,l,9,400,'#94a3b8'));});}},
{section:'Services',title:'ClusterIP — internal service routing',narration:'ClusterIP creates a stable virtual IP (not routable outside the cluster). kube-proxy sets iptables rules to distribute traffic to any healthy pod matching the selector. Pods always use the Service DNS name, never pod IPs.',render(s){clearSVG(s);rr(s,30,50,200,80,'#0c2a3a','#38bdf8',8,1.5);tx(s,130,82,'kubectl client',11,700,'#38bdf8');tx(s,130,98,'backend.prod:80',8.5,400,'#94a3b8');arrH(s,232,90,270,'#38bdf8');rr(s,272,50,210,80,'#0a0a1a','#818cf8',8,1.5);tx(s,377,82,'ClusterIP Service',10,700,'#818cf8');tx(s,377,98,'10.100.0.26:80',8.5,400,'#94a3b8');arrH(s,484,90,520,'#818cf8');rr(s,522,30,260,330,'#0a1a0a','#27AE60',8,1.5);tx(s,652,54,'app: backend pods',10,700,'#27AE60');['10.0.1.5:8080','10.0.1.6:8080','10.0.1.7:8080'].forEach((ip,i)=>{rr(s,540,70+i*88,224,72,'#0a2a0a','#27AE60',5,1);tx(s,652,100+i*88,ip,9.5,700,'#86efac');tx(s,652,116+i*88,'Pod ✓',8.5,400,'#94a3b8');});rr(s,30,195,200,60,'#0a1020','#475569',6,1.5);tx(s,130,218,'kube-proxy',10,700,'#475569');tx(s,130,234,'iptables rules',8.5,400,'#94a3b8');arrV(s,130,258,332,'#475569');arrH(s,232,280,268,'#818cf8');}},
{section:'Services',title:'LoadBalancer — instance mode vs IP mode',narration:'Instance mode: ALB/NLB routes to node port, then kube-proxy routes to pod. IP mode (recommended): ALB/NLB routes directly to pod IP, bypassing kube-proxy for lower latency.',render(s){clearSVG(s);tx(s,220,25,'Instance Mode',12,700,'#F39C12');rr(s,30,45,360,380,'#1a0a00','#F39C12',8,1.5);tx(s,210,68,'Traffic flows: NLB → Node:30080 → kube-proxy → Pod',8.5,400,'#94a3b8');['NLB','Node (NodePort)','kube-proxy','Pod'].forEach((l,i)=>{rr(s,80,90+i*76,260,60,'#1a1a0a','#F39C12',5,1);tx(s,210,123+i*76,l,11,700,'#F39C12');if(i<3)arrV(s,210,152+i*76,165+i*76,'#F39C12');});tx(s,580,25,'IP Mode (recommended)',12,700,'#27AE60');rr(s,440,45,340,380,'#0a1a00','#27AE60',8,1.5);tx(s,610,68,'Traffic flows: ALB → Pod IP directly',8.5,400,'#94a3b8');['ALB','Pod (VPC IP)'].forEach((l,i)=>{rr(s,490,90+i*180,260,60,'#0a2a0a','#27AE60',5,1);tx(s,620,123+i*180,l,11,700,'#27AE60');if(i<1)arrV(s,620,152,268,'#27AE60');});rr(s,490,330,260,60,'#0a1a2a','#38bdf8',5,1);tx(s,620,363,'Lower latency ✓',11,700,'#38bdf8');tx(s,610,415,'annotation: nlb-target-type: ip',8.5,400,'#c5e478');}},
{section:'Services',title:'Ingress — HTTP path-based routing',narration:'Ingress is a single entry point that routes HTTP traffic to multiple services by path or hostname. The AWS Load Balancer Controller creates an Application Load Balancer from an Ingress object.',render(s){clearSVG(s);rr(s,30,40,760,460,'#0a0f18','#818cf8',10,1.5);tx(s,410,62,'Ingress + AWS Load Balancer Controller',12,700,'#818cf8');rr(s,60,80,700,80,'#0a1a2a','#38bdf8',6,1.5);tx(s,410,108,'Internet → ALB (AWS Load Balancer Controller creates this)  annotation: ingressClassName: alb',9,700,'#38bdf8');[{path:'/webapp1',svc:'webapp1:32003',x:160},{path:'/webapp2',svc:'webapp2:32004',x:410},{path:'/api/*',svc:'api-service:80',x:650}].forEach(({path,svc,x})=>{arrV(s,x,162,188,'#818cf8');rr(s,x-100,190,200,60,'#0a1020','#818cf8',5,1);tx(s,x,215,path,9.5,700,'#818cf8');tx(s,x,231,'→ '+svc,8.5,400,'#94a3b8');arrV(s,x,252,290,'#27AE60');rr(s,x-100,292,200,100,'#0a1a0a','#27AE60',5,1);tx(s,x,330,svc.split(':')[0],10,700,'#27AE60');tx(s,x,348,'service',8,400,'#94a3b8');});rr(s,60,430,700,50,'#0a1020','#475569',6,1);tx(s,410,452,'Requires: AWS Load Balancer Controller installed as EKS add-on',9,400,'#94a3b8');}},
{section:'DNS',title:'Three-layer DNS in EKS',narration:'CoreDNS resolves cluster-internal names (*.svc.cluster.local). Route 53 VPC Resolver resolves VPC resources like RDS endpoints. Upstream DNS resolves the public internet.',render(s){clearSVG(s);tx(s,410,20,'DNS resolution — 3 layers',12,700,'#38bdf8');rr(s,30,45,760,140,'#0c2a3a','#38bdf8',8,1.5);tx(s,410,68,'Layer 1: CoreDNS (kube-system)',11,700,'#38bdf8');tx(s,410,86,'Resolves: backend.prod.svc.cluster.local → ClusterIP 10.100.0.26',9.5,400,'#94a3b8');tx(s,410,104,'EKS add-on: CoreDNS. Queries that match cluster.local go here first.',9,400,'#64748b');tx(s,410,120,'Installed as: Deployment in kube-system namespace',8.5,400,'#475569');rr(s,30,205,760,140,'#0c1a2a','#818cf8',8,1.5);tx(s,410,228,'Layer 2: VPC Route 53 Resolver (169.254.169.253)',11,700,'#818cf8');tx(s,410,246,'Resolves: mydb.xxxx.us-east-1.rds.amazonaws.com → 10.0.2.45',9.5,400,'#94a3b8');tx(s,410,264,'Handles all VPC-internal DNS and AWS service endpoints.',9,400,'#64748b');rr(s,30,365,760,140,'#0a1020','#F39C12',8,1.5);tx(s,410,388,'Layer 3: Upstream DNS (internet)',11,700,'#F39C12');tx(s,410,406,'Resolves: api.stripe.com → 18.195.22.1',9.5,400,'#94a3b8');tx(s,410,424,'Anything not matching cluster.local or VPC resources falls through here.',9,400,'#64748b');}},
{section:'Knowledge Checks',title:'Knowledge checks + traffic routing summary',narration:'KC1: Which services can be accessed from outside? Both NodePort AND LoadBalancer — answer D. KC2: What is VPC CNI? Plugin giving pods same VPC IP — answer D.',render(s){clearSVG(s);rr(s,30,30,760,160,'#0a1020','#38bdf8',8,1.5);tx(s,410,56,'KC1: Which service is accessible from outside the cluster?',11,700,'#38bdf8');[['A. ClusterIP','Internal only — never directly accessible from outside','#475569'],['B. NodePort','External via node IP + port 30000-32767 ✓','#27AE60'],['C. LoadBalancer','External via AWS NLB/ALB ✓','#27AE60'],['D. Both B and C','CORRECT ANSWER ✓','#27AE60']].forEach(([l,d,c],i)=>{rr(s,50,76+i*24,700,20,c+'06',c,3,.8);tx(s,60,90+i*24,`${l}: ${d}`,9,i>0&&i<4?700:400,c,'start');});rr(s,30,210,760,160,'#0a1020','#818cf8',8,1.5);tx(s,410,234,'KC2: What is the VPC Container Network Interface?',11,700,'#818cf8');[['A. Logical networking component in VPC','Not specific to pods','#475569'],['B. Method for private subnet internet access','That is NAT Gateway','#475569'],['C. K8s object that exposes pods','That is a Service','#475569'],['D. Plugin giving pods same IP inside pod as on VPC network','CORRECT ✓','#27AE60']].forEach(([l,d,c],i)=>{rr(s,50,254+i*24,700,20,c+'06',c,3,.8);tx(s,60,268+i*24,`${l}: ${d}`,9,i===3?700:400,c,'start');});}},
{section:'Summary',title:'Module 06 — key takeaways',narration:'VPC CNI = pods get real VPC IPs, no overlay. Four service types for different exposure needs. Network Policies enable zero-trust pod-to-pod networking. Three DNS layers handle cluster, VPC, and internet resolution.',render(s){clearSVG(s);tx(s,410,25,'Module 06 Summary',13,700,'#f1f5f9');[['🌐 VPC CNI','Pods get VPC IPs. Direct routing, no overlay. ENI secondary IPs per node.','#27AE60'],['🔒 Network Policies','Default-deny + selective allow = zero-trust. Ingress + Egress rules.','#E74C3C'],['🔗 ClusterIP','Default. Internal only. Stable virtual IP. kube-proxy iptables.','#38bdf8'],['🔓 NodePort / LB','NodePort: node IP + 30000-32767. LoadBalancer: AWS NLB/ALB.','#F39C12'],['🚦 Ingress','HTTP path/host routing via ALB. Needs AWS Load Balancer Controller.','#818cf8'],['📡 DNS','CoreDNS (cluster) → Route 53 VPC (AWS) → Upstream (internet).','#94a3b8']].forEach(([icon,desc,c],i)=>{rr(s,40,50+i*72,740,58,c+'08',c,6,1.5);tx(s,60,76+i*72,icon,11,700,c,'start');tx(s,240,76+i*72,desc,10,400,'#94a3b8','start');});}},
];
