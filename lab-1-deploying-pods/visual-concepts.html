<style>
:root{
  --bg:#06080d;--panel:#11151c;--p2:#1f2738;--text:#f1f5f9;--muted:#94a3b8;
  --accent:#38bdf8;--good:#27AE60;--bad:#E74C3C;--warn:#F39C12;
  --pod:#4A90E2;--svc:#1ABC9C;--dep:#9B59B6;--node:#E67E22;
  --sec:#E74C3C;--cm:#38bdf8;--kms:#27AE60;--aws:#F39C12;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;min-height:100vh;overflow-x:hidden;}
body{padding-left:58px;}

/* Rail */
.rail{position:fixed;top:0;left:0;bottom:0;width:58px;background:#0c1018;border-right:1px solid #1f2738;display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:3px;z-index:200;overflow-y:auto;}
.rb{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,#4A90E2,#9B59B6);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:.88em;text-decoration:none;margin-bottom:7px;flex-shrink:0;}
.rl{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1em;text-decoration:none;transition:background .12s;position:relative;flex-shrink:0;}
.rl:hover{background:rgba(255,255,255,.08);}
.rl.on{background:rgba(56,189,248,.18);}
.rl.on::before{content:'';position:absolute;left:-7px;top:9px;bottom:9px;width:3px;background:#38bdf8;border-radius:0 2px 2px 0;}
.rl:hover::after{content:attr(title);position:absolute;left:50px;top:50%;transform:translateY(-50%);background:#1f2738;color:#f1f5f9;padding:5px 11px;border-radius:6px;font-size:.78em;white-space:nowrap;border:1px solid #475569;z-index:300;pointer-events:none;}
.rsec{font-size:.52em;color:#334155;text-transform:uppercase;letter-spacing:.06em;padding:6px 0 2px;text-align:center;width:100%;flex-shrink:0;}

/* Header */
header{padding:16px 28px;background:linear-gradient(135deg,rgba(231,76,60,.85),rgba(155,89,182,.85)),var(--bg);border-bottom:1px solid rgba(255,255,255,.06);box-shadow:0 4px 20px rgba(0,0,0,.4);}
header h1{margin:0;font-size:1.3em;}
header p{margin:3px 0 0;opacity:.85;font-size:.85em;}

/* Layout */
.layout{display:grid;grid-template-columns:260px 1fr;gap:0;height:calc(100vh - 65px);}

/* Sidebar — topic list */
.sidebar{background:#0a0f18;border-right:1px solid var(--p2);overflow-y:auto;padding:12px 8px;}
.sidebar h3{font-size:.7em;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700;padding:4px 10px 8px;}
.topic-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:8px;border:none;background:none;color:var(--text);cursor:pointer;text-align:left;font-size:.84em;transition:background .12s;font-family:inherit;}
.topic-btn:hover{background:rgba(255,255,255,.05);}
.topic-btn.active{background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.25);}
.topic-btn .tnum{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7em;font-weight:700;background:var(--p2);border:1px solid #334155;flex-shrink:0;}
.topic-btn.active .tnum{background:rgba(56,189,248,.2);border-color:var(--accent);color:var(--accent);}
.topic-btn .tlabel{line-height:1.35;}
.topic-btn .tico{font-size:1.1em;flex-shrink:0;}

/* Main area */
.main{display:flex;flex-direction:column;background:var(--bg);}

/* Navbar */
.nbar{padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--p2);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.step-title{font-weight:700;font-size:1em;color:var(--accent);flex:1;}
.pbar{flex:1;min-width:100px;height:4px;background:#1e293b;border-radius:3px;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--bad),var(--dep));border-radius:3px;transition:width .3s;}
.pcnt{font-size:.78em;color:var(--muted);font-family:ui-monospace,monospace;white-space:nowrap;}
.nbts{display:flex;gap:6px;}
button{background:var(--p2);color:var(--text);border:1px solid #475569;padding:7px 12px;border-radius:6px;cursor:pointer;font-size:.86em;font-weight:600;transition:all .15s;font-family:inherit;}
button:hover:not(:disabled){background:#475569;}
button:disabled{opacity:.35;cursor:not-allowed;}
button.pri{background:var(--bad);border-color:var(--bad);color:#fff;}

/* SVG stage */
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;background:radial-gradient(ellipse at top,rgba(56,189,248,.04),transparent 60%),var(--bg);overflow:hidden;}
.stage svg{max-width:100%;max-height:100%;}

/* Explain panel */
.explain{padding:14px 20px;background:linear-gradient(135deg,#0d1320,#131a2a);border-top:1px solid var(--p2);}
.exgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.exlbl{font-size:.68em;color:var(--bad);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:4px;}
.extitle{font-size:1.05em;font-weight:700;margin-bottom:6px;}
.exbody{color:var(--muted);font-size:.86em;line-height:1.65;}
.exbody code{background:#050810;padding:1px 5px;border-radius:3px;color:#fde68a;font-family:ui-monospace,monospace;font-size:.88em;}
.exbody strong{color:var(--text);}
.narr{background:linear-gradient(135deg,#050810,#0b1020);border-left:3px solid var(--bad);border-radius:7px;padding:11px 15px;font-size:.9em;line-height:1.65;color:var(--text);font-style:italic;}
.narr-lbl{font-size:.68em;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:6px;}

/* Voice popup */
.vp{position:fixed;bottom:16px;left:66px;width:260px;background:var(--panel);border:1px solid var(--p2);border-radius:10px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:250;opacity:0;pointer-events:none;transform:translateX(-8px);transition:opacity .2s,transform .2s;}
.vp.open{opacity:1;pointer-events:auto;transform:translateX(0);}
.vph{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;font-size:.84em;font-weight:700;}
.vpr{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:7px 0;font-size:.84em;}
.vpr .lb{color:var(--muted);}
.vpr select{background:#0a0e1a;color:var(--text);border:1px solid #475569;border-radius:4px;padding:3px 6px;font-size:.84em;max-width:150px;font-family:inherit;}
.rail-spacer{flex:1;}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes flow{0%{stroke-dashoffset:40}100%{stroke-dashoffset:0}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 4px currentColor)}50%{filter:drop-shadow(0 0 14px currentColor)}}

.anim-in{animation:pop .4s ease-out;}
.anim-fade{animation:fadeIn .5s ease-out;}
.anim-flow{stroke-dasharray:8 4;animation:flow 1s linear infinite;}
.anim-pulse{animation:pulse 1s ease-in-out infinite;}
.anim-glow{animation:glow 2s ease-in-out infinite;}
.anim-shake{animation:shake .4s ease-in-out;}

@media(max-width:900px){.layout{grid-template-columns:1fr;}.sidebar{display:none;}.exgrid{grid-template-columns:1fr;}}
</style>

// ═══════════════════════════════════════════════════
//  SVG HELPERS
// ═══════════════════════════════════════════════════
const NS = 'http://www.w3.org/2000/svg';
function el(tag,attrs={}){const e=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e;}
function clear(svg){while(svg.firstChild)svg.removeChild(svg.firstChild);}
function add(svg,...els){els.forEach(e=>svg.appendChild(e));return svg;}

function rect(svg,x,y,w,h,fill,stroke,rx=8,sw=1.5){
  return svg.appendChild(el('rect',{x,y,width:w,height:h,rx,fill,stroke,'stroke-width':sw}));
}
function txt(svg,x,y,t,size=12,weight=400,fill='#f1f5f9',anchor='middle'){
  const e=el('text',{x,y,'font-size':size,'font-weight':weight,fill,'font-family':'system-ui,sans-serif','text-anchor':anchor});
  e.textContent=t;return svg.appendChild(e);
}
function circle(svg,cx,cy,r,fill,stroke,sw=1.5){
  return svg.appendChild(el('circle',{cx,cy,r,fill,stroke,'stroke-width':sw}));
}
function line(svg,x1,y1,x2,y2,stroke='#475569',sw=1.5,dash=''){
  const a={x1,y1,x2,y2,stroke,'stroke-width':sw};if(dash)a['stroke-dasharray']=dash;
  return svg.appendChild(el('line',a));
}
function arrow(svg,x1,y1,x2,y2,color='#38bdf8',sw=2,cls=''){
  const id='ar'+Math.random().toString(36).slice(2,7);
  let defs=svg.querySelector('defs');if(!defs){defs=el('defs');svg.insertBefore(defs,svg.firstChild);}
  const mk=el('marker',{id,markerWidth:7,markerHeight:7,refX:5,refY:3,orient:'auto'});
  mk.appendChild(el('polygon',{points:'0 0,7 3,0 6',fill:color}));defs.appendChild(mk);
  const ln=el('line',{x1,y1,x2,y2,stroke:color,'stroke-width':sw,'marker-end':`url(#${id})`});
  if(cls)ln.setAttribute('class',cls);return svg.appendChild(ln);
}
function animClass(e,cls,delay=0){setTimeout(()=>e&&e.setAttribute('class',cls),delay);}

// Tween a number attribute
function tween(el,attr,from,to,duration=400){
  const start=performance.now();
  function step(now){
    const t=Math.min((now-start)/duration,1);
    const val=from+(to-from)*t;
    el.setAttribute(attr,val);
    if(t<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ═══════════════════════════════════════════════════
//  TOPICS — each has frames with render(svg)+explain+narration

const TOPICS = [

{title:'🔐 Why Secrets? The Security Ladder', icon:'🔐', color:'#E74C3C',

    rect(svg,50,290,720,60,'rgba(231,76,60,.06)','#E74C3C',8,1.5);
    txt(svg,410,317,'❌  NEVER hardcode credentials. Git history is permanent.','12',700,'#f87171','middle');
    txt(svg,410,335,'Even a private repo can be leaked. Rotate immediately if this happens.','9',400,'#94a3b8','middle');
   }},

  {title:'Level 1 — Kubernetes Secret (base64, not encrypted)',
   explain:'A Kubernetes Secret moves the password out of your code. Pods consume it via env vars or volume mounts. BUT: stored in etcd as base64, which anyone with kubectl access can decode in one command.',
   narration:'Level one: a Kubernetes Secret. The password is out of your code. But it is only base64 encoded in etcd. Anyone with kubectl get secret can run echo and base64 dash d to decode it in under a second. Better than hardcoding, but not encrypted.',

    txt(svg,342,116,'cEBzc3cwcmQ=',9,700,'#f87171','middle');

    txt(svg,60,272,'p@ssw0rd123   ← decoded in 0.01 seconds',9,700,'#f87171','start');

    // Scale
    rect(svg,30,325,340,80,'rgba(39,174,96,.06)','#27AE60',8,1.5);
    txt(svg,200,350,'✓ Better than hardcoding',10,700,'#4ade80','middle');

    rect(svg,390,325,380,80,'rgba(231,76,60,.06)','#E74C3C',8,1.5);
    txt(svg,580,350,'❌ Still risks without KMS',10,700,'#f87171','middle');

   }},

  {title:'Level 2 — Secret + KMS Encryption (real encryption)',
   explain:'Enabling KMS envelope encryption on the EKS cluster means etcd stores encrypted bytes, not base64. Even if someone dumps the etcd database file, the contents are unreadable without the KMS key. The KMS key policy controls who can decrypt.',
   narration:'Level two: enable KMS envelope encryption. Now etcd stores truly encrypted bytes. Someone dumps the etcd file? Useless without the KMS key. The key policy in AWS IAM controls exactly who can decrypt. This is the production standard for EKS.',
   render(svg){

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let currentTopic = 0;
let currentFrame = 0;
let playing = false, ptimer = null;

function topic(){ return TOPICS[currentTopic]; }
function frame(){ return topic().frames[currentFrame]; }
const FRAMES_TOTAL = () => topic().frames.length;
const svg = document.getElementById('main-svg');

// ═══════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════
function render(){
  const t = topic();
  const f = frame();
  // SVG
  f.render(svg);
  // Explain
  document.getElementById('exlbl').textContent = `TOPIC ${currentTopic+1} · FRAME ${currentFrame+1} OF ${FRAMES_TOTAL()}`;
  document.getElementById('extitle').textContent = f.title;
  document.getElementById('exbody').innerHTML = f.explain;
  document.getElementById('narr').textContent = f.narration;
  const exEl=document.getElementById('explain'); if(exEl) exEl.style.borderLeftColor=t.color;
  // Navbar
  document.getElementById('step-title').textContent = f.title;
  document.getElementById('pcnt').textContent = `${currentFrame+1}/${FRAMES_TOTAL()}`;
  document.getElementById('pfill').style.width = `${((currentFrame+1)/FRAMES_TOTAL())*100}%`;
  document.getElementById('bprev').disabled = currentFrame===0;
  document.getElementById('bnext').disabled = currentFrame>=FRAMES_TOTAL()-1;
  // Sidebar
  document.querySelectorAll('.topic-btn').forEach((b,i)=>b.classList.toggle('active',i===currentTopic));
  speak(f.narration);
}

function selectTopic(idx){
  currentTopic = idx;
  currentFrame = 0;
  stopPlay();
  render();
}
function next(){ if(currentFrame<FRAMES_TOTAL()-1){ currentFrame++; render(); } else stopPlay(); }
function prev(){ if(currentFrame>0){ currentFrame--; render(); } }
function play(){ if(playing)return stopPlay(); playing=true; document.getElementById('bplay').textContent='⏸ Pause'; tick(); }
function stopPlay(){ playing=false; clearTimeout(ptimer); document.getElementById('bplay').textContent='▶ Play'; }
function tick(){ ptimer=setTimeout(()=>{ if(!playing)return; if(currentFrame>=FRAMES_TOTAL()-1){stopPlay();return;} currentFrame++;render();tick(); },4500); }

document.getElementById('bnext').onclick  = next;
document.getElementById('bprev').onclick  = prev;
document.getElementById('bplay').onclick  = play;
document.getElementById('breset').onclick = ()=>{ stopPlay();currentFrame=0;render(); };

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key===' '){e.preventDefault();play();}
  else if(e.key==='m'||e.key==='M')document.getElementById('bmute').click();
});

// ═══════════════════════════════════════════════════
//  TOPIC LIST
// ═══════════════════════════════════════════════════
function buildSidebar(){
  const c = document.getElementById('topic-list');
  TOPICS.forEach((t,i)=>{
    const b=document.createElement('button');
    b.className='topic-btn';
    b.innerHTML=`<span class="tico">${t.icon}</span><span class="tnum">${i+1}</span><span class="tlabel">${t.title.replace(/^[^ ]+ /,'')}</span>`;
    b.onclick=()=>selectTopic(i);
    c.appendChild(b);
  });
}

// ═══════════════════════════════════════════════════
//  VOICE
// ═══════════════════════════════════════════════════
let muted=localStorage.getItem('vc-muted')==='1',selV=null;
const synth=window.speechSynthesis;
const PREF=['Ava','Zoe','Allison','Samantha','Karen'];
function vscore(v){let s=0;if(/Premium/i.test(v.name))s+=100;else if(/Siri/i.test(v.name))s+=80;else if(/Enhanced/i.test(v.name))s+=60;const i=PREF.indexOf(v.name.replace(/\s*\([^)]*\)\s*/g,'').trim());if(i!==-1)s+=20-i;if(v.lang==='en-US')s+=5;return s;}
function populateV(){if(!synth)return;const vs=synth.getVoices().filter(v=>v.lang.startsWith('en')).sort((a,b)=>vscore(b)-vscore(a));const sel=document.getElementById('vsel');sel.innerHTML='';vs.forEach(v=>{const o=document.createElement('option');o.value=v.name;o.textContent=(/Premium|Siri|Enhanced/i.test(v.name)?'⭐ ':'')+v.name;sel.appendChild(o);});selV=(localStorage.getItem('vc-voice')&&vs.find(v=>v.name===localStorage.getItem('vc-voice')))||vs[0];if(selV)sel.value=selV.name;document.getElementById('bmute').textContent=muted?'🔇':'🔊';}
if(synth){synth.onvoiceschanged=populateV;populateV();}
function speak(t){if(!synth||muted||!t)return;try{synth.cancel();}catch(e){}(t.match(/[^.!?]+[.!?]+|\s*[^.!?]+$/g)||[t]).forEach(c=>{const u=new SpeechSynthesisUtterance(c.trim());if(selV)u.voice=selV;u.rate=0.95;synth.speak(u);});}
document.getElementById('bmute').onclick=()=>{muted=!muted;localStorage.setItem('vc-muted',muted?'1':'0');document.getElementById('bmute').textContent=muted?'🔇':'🔊';if(muted&&synth)try{synth.cancel();}catch(e){}};
document.getElementById('vsel').onchange=e=>{const v=synth.getVoices().find(x=>x.name===e.target.value);if(v){selV=v;localStorage.setItem('vc-voice',v.name);}};
document.getElementById('vbtn').onclick=e=>{e.stopPropagation();document.getElementById('vp').classList.toggle('open');};
document.addEventListener('click',e=>{if(!e.target.closest('#vp')&&!e.target.closest('#vbtn'))document.getElementById('vp').classList.remove('open');});

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
buildSidebar();
render();
</script>
