{section:'Deployment Methods',title:'From kubectl to automated deployment',narration:'Manual kubectl works for one app. At scale you need a registry (ECR), a package manager (Helm), and an automated CI/CD pipeline. These three steps eliminate manual errors and enable team collaboration.',render(s){clearSVG(s);tx(s,410,25,'Scaling application deployment',13,700,'#F39C12');[[130,'Step 1\nContainer Registry','Store and version\nyour container images\n→ Amazon ECR','#F39C12'],[410,'Step 2\nPackage Manager','Templatize and\npackage K8s manifests\n→ Helm charts','#818cf8'],[680,'Step 3\nCI/CD Pipeline','Automate build\ntest and deploy\n→ Jenkins / CodePipeline','#38bdf8']].forEach(([x,t,d,c])=>{rr(s,x-120,50,240,320,c+'08',c,10,1.5);t.split('\n').forEach((l,i)=>tx(s,x,80+i*20,l,12,i===0?400:700,i===0?'#94a3b8':c));d.split('\n').forEach((l,i)=>tx(s,x,135+i*26,l,10,400,'#94a3b8'));if(x<680){arrH(s,x+122,210,x+170,'#475569');}});}},
{section:'Amazon ECR',title:'ECR — the container image registry',narration:'ECR is fully managed, highly available, and integrates natively with IAM. Per account: one private registry + one public registry. Within each registry: multiple repositories. Each repository: multiple image tags.',render(s){clearSVG(s);tx(s,410,25,'ECR hierarchy',12,700,'#F39C12');rr(s,60,50,700,420,'#0a1020','#F39C12',10,1.5);tx(s,410,74,'AWS Account  (123456789012)',11,700,'#F39C12');rr(s,90,90,300,360,'#0c2a0a','#27AE60',8,1.5);tx(s,240,112,'Private Registry',11,700,'#27AE60');tx(s,240,128,'account.dkr.ecr.region.amazonaws.com',7.5,400,'#64748b');rr(s,110,145,260,80,'#0a1a0a','#27AE60',5,1);tx(s,240,165,'repo: my-app',9,700,'#86efac');tx(s,240,181,'my-app:v1.0  my-app:v1.1  my-app:latest',7.5,400,'#94a3b8');rr(s,110,240,260,80,'#0a1a0a','#27AE60',5,1);tx(s,240,260,'repo: nginx-proxy',9,700,'#86efac');tx(s,240,276,'nginx-proxy:1.25  nginx-proxy:1.26',7.5,400,'#94a3b8');rr(s,420,90,300,360,'#0c1a2a','#818cf8',8,1.5);tx(s,570,112,'Public Registry',11,700,'#818cf8');tx(s,570,128,'public.ecr.aws/myorg/',7.5,400,'#64748b');rr(s,440,145,260,80,'#0a0a1a','#818cf8',5,1);tx(s,570,165,'public open-source images',9,400,'#94a3b8');rr(s,440,240,260,80,'#0a0a1a','#818cf8',5,1);tx(s,570,265,'community shared charts',9,400,'#94a3b8');}},
{section:'Amazon ECR',title:'ECR workflow — 5 steps',narration:'Build locally, tag with the full ECR URI, authenticate Docker to ECR using AWS credentials, push the image, then reference it in your Kubernetes manifest.',render(s){clearSVG(s);tx(s,410,20,'ECR image workflow',12,700,'#F39C12');const steps=[['1. Build','docker build -t my-app:1.2 .','#38bdf8'],[' 2. Tag','docker tag my-app:1.2 123456789.dkr.ecr.us-east-1.amazonaws.com/my-app:1.2','#F39C12'],['3. Auth','aws ecr get-login-password | docker login --username AWS ...','#818cf8'],['4. Push','docker push 123456789.dkr.ecr.us-east-1.amazonaws.com/my-app:1.2','#27AE60'],['5. Deploy','kubectl apply -f deploy.yaml  (image: 123456789.../my-app:1.2)','#94a3b8']];steps.forEach(([t,cmd,c],i)=>{rr(s,40,50+i*90,740,72,c+'08',c,6,1.5);tx(s,60,76+i*90,t,12,700,c,'start');rr(s,150,58+i*90,600,34,'#03050a',c,4,1);tx(s,160,79+i*90,'$ '+cmd,9,400,'#c5e478','start');if(i<4){arrV(s,410,124+i*90,140+i*90,c);}});}},
{section:'Amazon ECR',title:'Image scanning — Basic vs Enhanced',narration:'Basic scanning uses Clair, can run on push or on demand, max once per 24h, finds OS-level CVEs. Enhanced scanning uses Amazon Inspector, scans OS and programming language packages, emits EventBridge events, costs more.',render(s){clearSVG(s);[[200,'Basic Scanning','Uses Clair (open-source)\nInvoke on push OR on demand\nOnce per 24 hours max\nOS-level CVEs only\nIncluded in ECR price','#F39C12'],[620,'Enhanced Scanning','Amazon Inspector integration\nOS + language pkg vulnerabilities\nContinuous re-scanning\nEmits EventBridge events\nAdditional cost','#38bdf8']].forEach(([x,t,d,c])=>{rr(s,x-160,40,320,380,c+'08',c,10,1.5);tx(s,x,68,t,12,700,c);d.split('\n').forEach((l,i)=>tx(s,x,100+i*44,l,10,400,'#94a3b8'));});tx(s,410,450,'For production: use Enhanced scanning + EventBridge alerts to block vulnerable images in CI/CD',9,700,'#94a3b8');}},
{section:'Helm',title:'What is Helm?',narration:'Helm is the Kubernetes package manager. A Helm chart bundles all K8s resources for an application: Deployment, Service, ConfigMap, Ingress. Install in one command, upgrade in one command, rollback in one command.',render(s){clearSVG(s);tx(s,410,25,'Helm — Kubernetes package manager',13,700,'#818cf8');rr(s,100,50,620,180,'#0a0a1a','#818cf8',10,1.5);tx(s,410,78,'Helm chart = one package for your whole app',11,700,'#818cf8');['Deployment (pod spec + replicas)','Service (network endpoint)','ConfigMap (configuration)','Ingress (HTTP routing)','HorizontalPodAutoscaler (scaling)'].forEach((r,i)=>{rr(s,130,95+i*24,560,20,'#1a1a2a','#818cf8',3,.8);tx(s,410,110+i*24,r,9,400,'#94a3b8');});[[120,'helm install\nmyapp ./chart','Install','#27AE60'],[340,'helm upgrade\nmyapp ./chart\n--set tag=2.0','Upgrade','#F39C12'],[560,'helm rollback\nmyapp 1','Rollback','#E74C3C'],[740,'helm uninstall\nmyapp','Remove','#94a3b8']].forEach(([x,t,l,c])=>{rr(s,x-80,265,160,160,c+'08',c,8,1.5);tx(s,x,290,l,11,700,c);t.split('\n').forEach((ln,i)=>tx(s,x,315+i*18,'$ '+ln,8.5,400,'#c5e478'));});}},
{section:'Helm',title:'Helm chart anatomy',narration:'Every chart is a directory with Chart.yaml (mandatory metadata), values.yaml (default config), and templates/ (K8s manifests with Go templating). Charts can depend on sub-charts in the charts/ directory.',render(s){clearSVG(s);tx(s,220,25,'Helm chart directory',12,700,'#818cf8');const tree=[['my-chart/','dir','#818cf8'],['  Chart.yaml','MANDATORY — name, version, description','#E74C3C'],['  values.yaml','Default configuration values','#F39C12'],['  templates/','K8s manifest templates','#38bdf8'],['    deployment.yaml','Deployment with Go templating','#38bdf8'],['    service.yaml','Service definition','#38bdf8'],['    _helpers.tpl','Reusable template snippets','#64748b'],['  charts/','Sub-chart dependencies','#27AE60']];tree.forEach(([f,d,c],i)=>{rr(s,30,45+i*55,370,44,c+'08',c,5,1);tx(s,40,65+i*55,f,10,700,c,'start');tx(s,40,79+i*55,d,8.5,400,'#94a3b8','start');});rr(s,440,45,320,200,'#1a0505','#E74C3C',8,1.5);tx(s,600,70,'Chart.yaml (MANDATORY)',11,700,'#E74C3C');tx(s,600,90,'must include:',9,400,'#94a3b8');['apiVersion: v2','name: my-app','version: 1.2.3','appVersion: "2.0.1"','description: My EKS application'].forEach((l,i)=>tx(s,600,108+i*20,l,9,400,'#c5e478'));}},
{section:'Helm',title:'Helm templating — values.yaml feeds templates',narration:'Template files use Go templating syntax: .Release.Name is the release name, .Values.image is from values.yaml. Render with helm template. Override at install with --set or --values.',render(s){clearSVG(s);rr(s,30,30,360,380,'#0a0a1a','#F39C12',8,1.5);tx(s,210,55,'values.yaml',11,700,'#F39C12');['name: my-app','image: nginx','tag: "0.2"','port: 8080','replicas: 3','env: production'].forEach((l,i)=>tx(s,210,80+i*28,l,10,400,'#c5e478'));arrH(s,392,210,428,'#818cf8');rr(s,430,30,340,380,'#0a0a1a','#818cf8',8,1.5);tx(s,600,55,'templates/deploy.yaml',11,700,'#818cf8');['metadata:','  name: {{ .Release.Name }}','  namespace: {{ .Release.Namespace }}','spec:','  replicas: {{ .Values.replicas }}','  containers:','  - name: {{ .Values.name }}','    image: {{ .Values.image }}:{{ .Values.tag }}','    ports:','    - containerPort: {{ .Values.port }}'].forEach((l,i)=>tx(s,600,80+i*26,l,9,400,'#c5e478'));rr(s,200,440,420,60,'#0a2a0a','#27AE60',6,1.5);tx(s,410,462,'helm install myrelease ./chart --set tag=1.5 --set replicas=5',9.5,400,'#c5e478');tx(s,410,478,'→ overrides values.yaml at install time',9,400,'#86efac');}},
{section:'Helm',title:'Helm chart repositories',narration:'Artifact Hub is the public chart registry with thousands of community charts. You can also store charts in Amazon ECR as OCI artifacts, or use Amazon S3 as a private Helm repository.',render(s){clearSVG(s);tx(s,410,25,'Helm chart sources',12,700,'#818cf8');[[200,'Artifact Hub\nartifacthub.io','Public charts: nginx, prometheus,\ncert-manager, kafka, postgres\nhelm repo add bitnami ...\n20,000+ charts available','#38bdf8'],[420,'Amazon ECR','Store as OCI artifacts\naws ecr create-repository ...\nhelm push chart.tgz oci://...\nPrivate + IAM secured','#F39C12'],[640,'Amazon S3','helm-s3 plugin required\nhelm s3 push chart.tgz s3://...\nGood for private orgs\nLab 2 uses this method','#818cf8']].forEach(([x,t,d,c])=>{rr(s,x-100,50,200,380,c+'08',c,8,1.5);t.split('\n').forEach((l,i)=>tx(s,x,76+i*18,l,11,700,c));d.split('\n').forEach((l,i)=>tx(s,x,122+i*28,l,9,400,'#94a3b8'));});}},
{section:'Knowledge Checks',title:'Knowledge checks — official answers',narration:'KC1: Two true statements about ECR: A (each account has default private + public registry) and D (multiple repos within a registry). KC2: Mandatory chart file = D: Chart.yaml.',render(s){clearSVG(s);rr(s,30,30,760,220,'#0a1020','#F39C12',10,1.5);tx(s,410,58,'KC1: True statements about ECR (select TWO)',11,700,'#F39C12');[['A. Each account has default private + public registry','✓ CORRECT','#27AE60'],['B. Account has one private repo + one public repo','✗ WRONG — registries have many repos','#E74C3C'],['C. Can create multiple registries per account','✗ WRONG — one private, one public per account','#E74C3C'],['D. Multiple repositories within a registry','✓ CORRECT','#27AE60'],['E. Multiple registries within a repository','✗ WRONG — inverted hierarchy','#E74C3C']].forEach(([l,r,c],i)=>{rr(s,50,76+i*28,500,22,c+'06',c,3,.8);tx(s,60,91+i*28,l,9,400,c,'start');tx(s,560,91+i*28,r,9,700,c,'start');});rr(s,30,268,760,140,'#0a0a1a','#818cf8',10,1.5);tx(s,410,292,'KC2: Which mandatory file contains chart information?',11,700,'#818cf8');[['A. Contents.yaml','✗'],['B. Config.yaml','✗'],['C. Templates.yaml','✗'],['D. Chart.yaml','✓ CORRECT — name, version, description, apiVersion']].forEach(([l,r],i)=>{const c=i===3?'#27AE60':'#475569';rr(s,50,314+i*24,700,20,c+'06',c,3,.8);tx(s,60,328+i*24,l,9,i===3?700:400,c,'start');tx(s,560,328+i*24,r,9,700,c,'start');});}},
{section:'Summary',title:'Module 04 — key takeaways',narration:'ECR is your private container registry — registry/repo/image hierarchy. Helm is your package manager — Chart.yaml is mandatory. Templating separates config from structure. S3, ECR, or Artifact Hub as chart repos.',render(s){clearSVG(s);tx(s,410,25,'Module 04 Summary',13,700,'#f1f5f9');[['🚀 Deployment path','Registry → package manager → CI/CD. Three steps to scalable deployment.','#F39C12'],['📦 ECR hierarchy','Account → Registry (private+public) → Repositories → Image tags.','#27AE60'],['🔍 Image scanning','Basic (Clair, 24h limit) vs Enhanced (Inspector, OS+packages, EventBridge).','#38bdf8'],['⎈ Helm chart','Chart.yaml (mandatory), values.yaml (config), templates/ (K8s manifests).','#818cf8'],['🔧 Templating','{{ .Values.key }} pulls from values.yaml. Override with --set at install.','#F39C12'],['📚 Chart repos','Artifact Hub (public) | ECR (OCI) | S3 + helm-s3 plugin (Lab 2).','#94a3b8']].forEach(([icon,desc,c],i)=>{rr(s,40,50+i*72,740,58,c+'08',c,6,1.5);tx(s,60,76+i*72,icon,11,700,c,'start');tx(s,240,76+i*72,desc,10,400,'#94a3b8','start');});}},
